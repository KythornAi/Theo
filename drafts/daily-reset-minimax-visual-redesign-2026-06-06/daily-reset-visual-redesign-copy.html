        if (!sessionFlags.sundayDismissed && settings.sundayReview && isSundayToday() && parked.length > 0) {
          const today2 = state.todayKey();
          const last = state.get(KEYS.lastSundayPrompt);
          if (last !== today2) {
            out.push(`
              <div id="pnp-banner-sunday" class="pnp-no-print pnp-surface border pnp-border rounded-xl p-4 mt-4 flex items-start gap-3">
                <span class="pnp-accent text-lg">☼</span>
                <div class="flex-1">
                  <p class="text-sm">You have ${parked.length} ${parked.length === 1 ? 'thing' : 'things'} parked. Want a quick skim?</p>
                  <div class="mt-2 flex gap-3">
                    <button data-banner="sunday-yes" class="pnp-bg-accent rounded-md px-3 py-1.5 text-sm font-medium">Skim now</button>
                    <button data-banner="sunday-dismiss" class="pnp-muted text-sm underline">Not today</button>
                  </div>
                </div>
              </div>`);
          }
        }

        if (!sessionFlags.overflowDismissed && parked.length > 15) {
          out.push(`
            <div id="pnp-banner-overflow" class="pnp-no-print pnp-muted text-xs mt-3 flex items-center gap-2">
              <span>Your lot's getting busy. Want to skim?</span>
              <button data-banner="overflow-yes" class="underline hover:opacity-80">Skim</button>
              <span>·</span>
              <button data-banner="overflow-dismiss" class="underline hover:opacity-80">Dismiss</button>
            </div>`);
        }

        return out.join('');
      }

      function wireBanners(root) {
        const yes = root.querySelector('[data-banner="yesterday-yes"]');
        if (yes) yes.addEventListener('click', () => {
          const yKey = yesterdayKey();
          const yEntry = state.getToday(yKey);
          if (yEntry && Array.isArray(yEntry.items)) {
            const outstanding = yEntry.items.filter(i => !i.done && !i.isParent);
            outstanding.forEach(o => state.addParked(o.text));
            yEntry.items = yEntry.items.filter(i => i.done && !i.isParent);
            yEntry.wrapped = true;
            state.setToday(yEntry, yKey);
          }
          sessionFlags.yesterdayHandled = true;
          paint();
        });
        const yDis = root.querySelector('[data-banner="yesterday-dismiss"]');
        if (yDis) yDis.addEventListener('click', () => { sessionFlags.yesterdayHandled = true; paint(); });

        const sYes = root.querySelector('[data-banner="sunday-yes"]');
        if (sYes) sYes.addEventListener('click', () => {
          state.set(KEYS.lastSundayPrompt, state.todayKey());
          sessionFlags.sundayDismissed = true;
          advance('S4', { source: 'parked', returnTo: 'S6' });
        });
        const sDis = root.querySelector('[data-banner="sunday-dismiss"]');
        if (sDis) sDis.addEventListener('click', () => {
          state.set(KEYS.lastSundayPrompt, state.todayKey());
          sessionFlags.sundayDismissed = true;
          paint();
        });

        const oYes = root.querySelector('[data-banner="overflow-yes"]');
        if (oYes) oYes.addEventListener('click', () => {
          sessionFlags.overflowDismissed = true;
          advance('S4', { source: 'parked', returnTo: 'S6' });
        });
        const oDis = root.querySelector('[data-banner="overflow-dismiss"]');
        if (oDis) oDis.addEventListener('click', () => { sessionFlags.overflowDismissed = true; paint(); });
      }

      function renderPlusOneBanner({ today, items, mood }) {
        if (!items || items.length === 0) return '';
        if (!todayHasRoom(today)) return '';
        if (today.plusOneUsed) return '';
        if (today.plusOneDismissed) return '';

        const actionable = items.filter(i => !i.isParent);
        const total = actionable.length;
        const done = actionable.filter(i => i.done).length;
        if (done === 0) return '';
        if (done >= total) return '';
        const pct = done / total;
        const lowEnergy = mood === 'overwhelmed' || mood === 'tired';
        const trigger = lowEnergy ? 0.75 : 0.5;
        if (pct < trigger) return '';

        const isGreat = mood === 'great';
        const addClass = isGreat
          ? 'pnp-bg-accent rounded-md px-4 py-2 text-sm font-medium'
          : 'pnp-bg-accent rounded-md px-3 py-1.5 text-sm font-medium';
        const stayClass = lowEnergy
          ? 'pnp-bg-accent rounded-md px-4 py-2 text-sm font-medium'
          : 'pnp-muted text-sm underline';
        const addLabel = lowEnergy ? 'Add one more' : 'Add one more';
        const stayLabel = 'Stay focused';
        // For low-energy moods, swap so "Stay focused" is the prominent button.
        const buttonsHtml = lowEnergy
          ? `<button data-plusone="stay" class="${stayClass}">${stayLabel}</button>
             <button data-plusone="add" class="pnp-muted text-sm underline">${addLabel}</button>`
          : `<button data-plusone="add" class="${addClass}">${addLabel}</button>
             <button data-plusone="stay" class="${stayClass}">${stayLabel}</button>`;

        return `
          <div id="pnp-plusone" class="pnp-no-print pnp-surface border pnp-border rounded-xl p-4 mt-4">
            <p class="text-sm">You're ${pct >= 0.75 ? 'most of the way there' : 'halfway'}. Want to add one more, or stay focused on your plan?</p>
            <div class="mt-3 flex gap-3 items-center">${buttonsHtml}</div>
          </div>`;
      }

      function wirePlusOne(root, repaint) {
        const stay = root.querySelector('[data-plusone="stay"]');
        if (stay) stay.addEventListener('click', () => {
          const today = state.getToday();
          if (today) { today.plusOneDismissed = true; state.setToday(today); }
          repaint();
        });
        const add = root.querySelector('[data-plusone="add"]');
        if (add) add.addEventListener('click', () => openPlusOneInput(repaint));
      }

      function openPlusOneInput(repaint) {
        const parked = state.get(KEYS.parked, []);
        const picks = parked
          .slice()
          .sort((a, b) => Date.parse(b.lastTouched || 0) - Date.parse(a.lastTouched || 0))
          .slice(0, 4);
        const hasParked = picks.length > 0;

        let stage = hasParked ? 'pick' : 'new';

        const overlay = document.createElement('div');
        overlay.className = 'pnp-no-print fixed inset-0 z-40 flex items-end sm:items-center justify-center p-4';
        overlay.style.background = 'rgba(0,0,0,0.6)';
        document.body.appendChild(overlay);

        function close() {
          document.removeEventListener('keydown', escClose);
          overlay.remove();
        }
        function escClose(e) { if (e.key === 'Escape') close(); }
        overlay.addEventListener('click', e => { if (e.target === overlay) close(); });
        document.addEventListener('keydown', escClose);

        function markUsed() {
          const today = state.getToday();
          if (today) { today.plusOneUsed = true; state.setToday(today); }
        }

        function addFromParked(id) {
          if (!todayHasRoom()) {
            showToast("Today's list is full. Start a new reset if you want to do more.", 'OK', null, 4000);
            close();
            return;
          }
          const all = state.get(KEYS.parked, []);
          const item = all.find(p => p.id === id);
          if (!item) return;
          state.addTodayItem(item.text);
          state.removeParked(id);
          markUsed();
          close();
          repaint();
        }

        function paintOverlay() {
          if (stage === 'pick') {
            overlay.innerHTML = `
              <div class="pnp-surface border pnp-border rounded-2xl p-6 w-full max-w-md max-h-full overflow-y-auto">
                <div class="flex items-start justify-between gap-3">
                  <div>
                    <h2 class="text-xl font-semibold">One more from your parking lot?</h2>
                    <p class="pnp-muted text-sm mt-1">Tap one to add it to today.</p>
                  </div>
                  <button data-plus-close class="pnp-muted text-sm underline shrink-0">Close</button>
                </div>
                <ul class="mt-5 space-y-2">
                  ${picks.map(p => `
                    <li>
                      <button data-plus-pick="${escapeHtml(p.id)}"
                        class="w-full text-left pnp-surface border pnp-border rounded-xl p-4 hover:border-[var(--pnp-accent)] transition-colors flex items-start gap-3">
                        <span class="pnp-accent">•</span>
                        <span class="flex-1">${escapeHtml(renderText(p.text))}</span>
                      </button>
                    </li>`).join('')}
                </ul>
                <div class="mt-5 flex items-center gap-3">
                  <button data-plus-new class="pnp-muted text-sm underline hover:opacity-80">Add something new instead</button>
                </div>
              </div>`;
            overlay.querySelectorAll('[data-plus-pick]').forEach(btn => {
              btn.addEventListener('click', () => addFromParked(btn.dataset.plusPick));
            });
            overlay.querySelector('[data-plus-close]').addEventListener('click', close);
            overlay.querySelector('[data-plus-new]').addEventListener('click', () => { stage = 'new'; paintOverlay(); });
            return;
          }

          // stage === 'new' — free-text input
          overlay.innerHTML = `
            <div class="pnp-surface border pnp-border rounded-2xl p-6 w-full max-w-md">
              <div class="flex items-start justify-between gap-3">
                <div>
                  <h2 class="text-xl font-semibold">One more thing</h2>
                  <p class="pnp-muted text-sm mt-1">Goes onto today's list.</p>
                </div>
                <button data-plus-close class="pnp-muted text-sm underline shrink-0">Close</button>
              </div>
              <textarea data-plus-input rows="3" maxlength="180"
                class="w-full mt-4 pnp-surface border pnp-border rounded-xl p-4 outline-none focus:border-[var(--pnp-accent)] resize-none"
                placeholder="What's the one more?"></textarea>
              <div class="mt-4 flex items-center gap-3 justify-end">
                ${hasParked ? '<button data-plus-back class="pnp-muted text-sm underline">Back to parked</button>' : ''}
                <button data-plus-save class="pnp-bg-accent rounded-md px-4 py-2 font-medium opacity-50" disabled>Add</button>
              </div>
            </div>`;
          const ta = overlay.querySelector('[data-plus-input]');
          const save = overlay.querySelector('[data-plus-save]');
          ta.focus();
          ta.addEventListener('input', () => {
            const has = ta.value.trim().length > 0;
            save.disabled = !has;
            save.classList.toggle('opacity-50', !has);
          });
          overlay.querySelector('[data-plus-close]').addEventListener('click', close);
          const backBtn = overlay.querySelector('[data-plus-back]');
          if (backBtn) backBtn.addEventListener('click', () => { stage = 'pick'; paintOverlay(); });
          save.addEventListener('click', () => {
            const text = renderText(ta.value);
            if (!text) { close(); return; }
            if (!todayHasRoom()) {
              showToast("Today's list is full. Start a new reset if you want to do more.", 'OK', null, 4000);
              close();
              return;
            }
            state.addTodayItem(text);
            markUsed();
            close();
            repaint();
          });
        }

        paintOverlay();
      }

      function openTinyTimer(taskId, repaint) {
        const today = state.getToday();
        const item = today && Array.isArray(today.items)
          ? today.items.find(i => i.id === taskId)
          : null;
        if (!item || item.done) return;

        let seconds = 5 * 60;
        let remaining = seconds;
        let running = false;
        let timer = null;

        const overlay = document.createElement('div');
        overlay.className = 'pnp-no-print fixed inset-0 z-50 flex items-end sm:items-center justify-center p-4';
        overlay.style.background = 'rgba(0,0,0,0.6)';
        document.body.appendChild(overlay);
        overlay.innerHTML = `
          <div class="pnp-surface border pnp-border rounded-2xl p-6 w-full max-w-md">
            <div class="flex items-start justify-between gap-3">
              <div>
                <p class="pnp-muted text-xs uppercase tracking-wide">Tiny timer</p>
                <h2 class="text-xl font-semibold mt-1">Just start.</h2>
              </div>
              <button data-timer-close class="pnp-muted text-sm underline shrink-0">Close</button>
            </div>
            <p class="pnp-muted text-sm mt-3">Do the first few minutes of:</p>
            <p class="mt-2 text-lg">• ${escapeHtml(renderText(item.text))}</p>
            <div class="mt-5 grid grid-cols-4 gap-2">
              ${[5,10,15,20].map(min => `
                <button data-min="${min}"
                  class="rounded-md border pnp-border py-2 text-sm">
                  ${min}
                </button>`).join('')}
            </div>
            <div class="mt-6 text-center">
              <div data-timer-display class="text-5xl font-semibold tabular-nums">${formatTime(remaining)}</div>
              <p data-timer-note class="pnp-muted text-xs mt-2">Starting counts. Finishing is optional.</p>
            </div>
            <div class="mt-6 flex flex-wrap items-center gap-3 justify-center">
              <button data-timer-toggle class="pnp-bg-accent rounded-md px-5 py-2.5 font-medium">Start</button>
              <button data-timer-done class="pnp-surface border pnp-border rounded-md px-4 py-2 text-sm hover:border-[var(--pnp-accent)] transition-colors">Mark done</button>
            </div>
          </div>`;

        function formatTime(value) {
          const mins = Math.floor(value / 60);
          const secs = String(value % 60).padStart(2, '0');
          return `${mins}:${secs}`;
        }

        function refreshTimerUi() {
          const display = overlay.querySelector('[data-timer-display]');
          const note = overlay.querySelector('[data-timer-note]');
          const toggle = overlay.querySelector('[data-timer-toggle]');
          if (display) display.textContent = formatTime(remaining);
          if (note) note.textContent = remaining === 0 ? 'That was a real start.' : 'Starting counts. Finishing is optional.';
          if (toggle) toggle.textContent = running ? 'Pause' : remaining === 0 ? 'Restart' : 'Start';
          overlay.querySelectorAll('[data-min]').forEach(btn => {
            const selected = seconds === Number(btn.dataset.min) * 60;
            btn.classList.toggle('pnp-bg-accent', selected);
            btn.classList.toggle('pnp-surface', !selected);
          });
        }

        function stopTimer() {
          running = false;
          if (timer) clearInterval(timer);
          timer = null;
          refreshTimerUi();
        }

        function close() {
          stopTimer();
          document.removeEventListener('keydown', escClose);
          overlay.remove();
        }

        function tick() {
          remaining = Math.max(0, remaining - 1);
          refreshTimerUi();
          if (remaining === 0) {
            running = false;
            if (timer) clearInterval(timer);
            timer = null;
            refreshTimerUi();
          }
        }

        function startPause() {
          if (running) { stopTimer(); return; }
          if (timer) clearInterval(timer);
          if (remaining === 0) remaining = seconds;
          running = true;
          timer = setInterval(tick, 1000);
          refreshTimerUi();
        }

        function setMinutes(minutes) {
          if (running) stopTimer();
          seconds = minutes * 60;
          remaining = seconds;
          refreshTimerUi();
        }

        function markDone() {
          const t = state.getToday();
          if (t && Array.isArray(t.items)) {
            const match = t.items.find(i => i.id === taskId);
            if (match) match.done = true;
            state.setToday(t);
          }
          close();
          repaint();
        }

        function escClose(e) { if (e.key === 'Escape') close(); }
        overlay.addEventListener('click', e => { if (e.target === overlay) close(); });
        overlay.querySelectorAll('[data-min]').forEach(btn => {
          btn.addEventListener('click', () => setMinutes(Number(btn.dataset.min)));
        });
        overlay.querySelector('[data-timer-toggle]').addEventListener('click', startPause);
        overlay.querySelector('[data-timer-done]').addEventListener('click', markDone);
        overlay.querySelector('[data-timer-close]').addEventListener('click', close);
        document.addEventListener('keydown', escClose);
        refreshTimerUi();
      }

      function openStuckOverlay(repaint) {
        const today = state.getToday();
        if (!today || !Array.isArray(today.items) || today.items.length === 0) return;
        const mood = today.mood || 'okay';
        const open = today.items.filter(i => !i.done && !i.isParent);
        if (open.length === 0) return;

        const prompts = {
          overwhelmed: "Which task could be made smaller?",
          tired:       "Which task could be made easier to start?",
          okay:        "Pick one task to adjust.",
          great:       "Pick one task to adjust.",
        };
        const prompt = prompts[mood] || prompts.okay;

        let stage = 'pick';
        let pickedId = null;

        const overlay = document.createElement('div');
        overlay.className = 'pnp-no-print fixed inset-0 z-40 flex items-end sm:items-center justify-center p-4';
        overlay.style.background = 'rgba(0,0,0,0.6)';
        document.body.appendChild(overlay);

        function paintOverlay() {
          if (stage === 'pick') {
            overlay.innerHTML = `
              <div class="pnp-surface border pnp-border rounded-2xl p-6 w-full max-w-md max-h-full overflow-y-auto">
                <div class="flex items-start justify-between gap-3">
                  <h2 class="text-xl font-semibold">${escapeHtml(prompt)}</h2>
                  <button data-stuck-close class="pnp-muted text-sm underline shrink-0">Close</button>
                </div>
                <ul class="mt-5 space-y-2">
                  ${open.map(it => `
                    <li>
                      <button data-stuck-pick="${escapeHtml(it.id)}"
                        class="w-full text-left pnp-surface border pnp-border rounded-xl p-4 hover:border-[var(--pnp-accent)] transition-colors">
                        <span class="pnp-accent">•</span>
                        <span class="ml-2">${escapeHtml(renderText(it.text))}</span>
                      </button>
                    </li>`).join('')}
                </ul>
              </div>`;
            overlay.querySelectorAll('[data-stuck-pick]').forEach(btn => {
              btn.addEventListener('click', () => {
                pickedId = btn.dataset.stuckPick;
                stage = 'choice';
                paintOverlay();
              });
            });
            overlay.querySelector('[data-stuck-close]').addEventListener('click', close);
            return;
          }

          if (stage === 'choice') {
            const item = open.find(i => i.id === pickedId);
            const itemText = item ? renderText(item.text) : '';
            overlay.innerHTML = `
              <div class="pnp-surface border pnp-border rounded-2xl p-6 w-full max-w-md max-h-full overflow-y-auto">
                <div class="flex items-start justify-between gap-3">
                  <div>
                    <p class="pnp-muted text-xs uppercase tracking-wide">Breaking down</p>
                    <h2 class="text-lg font-semibold mt-1">${escapeHtml(itemText)}</h2>
                  </div>
                  <button data-stuck-close class="pnp-muted text-sm underline shrink-0">Close</button>
                </div>
                <p class="pnp-muted text-sm mt-3">Choose a lighter way into it.</p>
<div class="mt-5 grid gap-3">
                  <button data-stuck-breakdown class="pnp-surface border pnp-border rounded-md px-4 py-3 text-left hover:border-[var(--pnp-accent)] transition-colors">Make it smaller</button>
                  <button data-stuck-timer class="pnp-surface border pnp-border rounded-md px-4 py-3 text-left hover:border-[var(--pnp-accent)] transition-colors">Start a tiny timer</button>
                </div>
                <div class="mt-5 flex items-center gap-3 justify-end">
                  <button data-stuck-back class="pnp-muted text-sm underline">Back</button>
                </div>
              </div>`;
            overlay.querySelector('[data-stuck-back]').addEventListener('click', () => { stage = 'pick'; paintOverlay(); });
            overlay.querySelector('[data-stuck-close]').addEventListener('click', close);
            overlay.querySelector('[data-stuck-breakdown]').addEventListener('click', () => { stage = 'breakdown'; paintOverlay(); });
            overlay.querySelector('[data-stuck-timer]').addEventListener('click', () => {
              close();
              openTinyTimer(pickedId, repaint);
            });
            return;
          }

          if (stage === 'breakdown') {
            const item = open.find(i => i.id === pickedId);
            const itemText = item ? renderText(item.text) : '';
            overlay.innerHTML = `
              <div class="pnp-surface border pnp-border rounded-2xl p-6 w-full max-w-md max-h-full overflow-y-auto">
                <div class="flex items-start justify-between gap-3">
                  <div>
                    <p class="pnp-muted text-xs uppercase tracking-wide">Make it smaller</p>
                    <h2 class="text-lg font-semibold mt-1">What's one small step that would get this moving?</h2>
                  </div>
                  <button data-stuck-close class="pnp-muted text-sm underline shrink-0">Close</button>
                </div>
                <p class="pnp-muted text-sm mt-4 opacity-70">${escapeHtml(itemText)}</p>
                <p class="pnp-muted text-xs mt-3">Start smaller than feels useful. Add as many steps as you need.</p>
                <div class="mt-4 space-y-3">
                  ${[0,1,2,3].map(i => `
                    <input data-step="${i}" type="text" maxlength="180"
                      class="w-full pnp-surface border pnp-border rounded-xl p-3 outline-none focus:border-[var(--pnp-accent)]"
                      placeholder="${i === 0 ? 'First action (as small as possible)' : 'Next small step'}" />`).join('')}
                </div>
                <div class="mt-5 flex items-center gap-3 justify-end">
                  <button data-stuck-back class="pnp-muted text-sm underline">Back</button>
                  <button data-stuck-save class="pnp-bg-accent rounded-md px-4 py-2 text-sm font-medium opacity-50" disabled>Save steps</button>
                </div>
              </div>`;
            const inputs = Array.from(overlay.querySelectorAll('input[data-step]'));
            const save = overlay.querySelector('[data-stuck-save]');
            inputs[0].focus();
            const refresh = () => {
              const has = inputs.some(input => input.value.trim().length > 0);
              save.disabled = !has;
              save.classList.toggle('opacity-50', !has);
            };
            inputs.forEach(input => input.addEventListener('input', refresh));
            overlay.querySelector('[data-stuck-back]').addEventListener('click', () => { stage = 'choice'; paintOverlay(); });
            overlay.querySelector('[data-stuck-close]').addEventListener('click', close);
            save.addEventListener('click', () => {
              const steps = inputs.map(input => renderText(input.value)).filter(Boolean);
              if (steps.length === 0) return;
              applyBreakdown(pickedId, steps);
              close();
              repaint();
            });
          }
        }

        function applyBreakdown(itemId, steps) {
          const t = state.getToday();
          if (!t || !Array.isArray(t.items)) return;
          const idx = t.items.findIndex(i => i.id === itemId);
          if (idx < 0) return;
          const parent = t.items[idx];
          const childSteps = steps.map(step => ({
            id: cryptoId(),
            text: step,
            done: false,
            parentId: parent.id,
          }));
          t.items.splice(idx, 1, { ...parent, done: false, isParent: true }, ...childSteps);
          state.setToday(t);
        }

        function close() {
          document.removeEventListener('keydown', escClose);
          overlay.remove();
        }
        function escClose(e) { if (e.key === 'Escape') close(); }
        overlay.addEventListener('click', e => { if (e.target === overlay) close(); });
        document.addEventListener('keydown', escClose);

        paintOverlay();
      }

      function openFab() {
        const overlay = document.createElement('div');
        overlay.className = 'pnp-no-print fixed inset-0 z-40 flex items-end sm:items-center justify-center p-4';
        overlay.style.background = 'rgba(0,0,0,0.6)';
        overlay.innerHTML = `
          <div class="pnp-surface border pnp-border rounded-2xl p-6 w-full max-w-md">
            <h2 class="text-xl font-semibold">Quick dump</h2>
            <textarea id="pnp-fab-input" rows="3" maxlength="180"
              class="w-full mt-4 pnp-surface border pnp-border rounded-xl p-4 outline-none focus:border-[var(--pnp-accent)] resize-none"
              placeholder="What's on your mind?"></textarea>
            <p class="pnp-muted text-xs mt-2">Goes to your unsorted dump. Sort it next time.</p>
            <div class="mt-4 flex items-center gap-3 justify-end">
              <button id="pnp-fab-cancel" class="pnp-muted text-sm underline">Cancel</button>
              <button id="pnp-fab-save" class="pnp-bg-accent rounded-md px-4 py-2 font-medium opacity-50" disabled>Save</button>
            </div>
          </div>`;
        document.body.appendChild(overlay);
        const ta   = overlay.querySelector('#pnp-fab-input');
        const save = overlay.querySelector('#pnp-fab-save');
        ta.focus();
        ta.addEventListener('input', () => {
          const has = ta.value.trim().length > 0;
          save.disabled = !has;
          save.classList.toggle('opacity-50', !has);
        });
        function close() {
          document.removeEventListener('keydown', escClose);
          overlay.remove();
        }
        function escClose(e) { if (e.key === 'Escape') close(); }
        overlay.querySelector('#pnp-fab-cancel').addEventListener('click', close);
        save.addEventListener('click', () => {
          const text = renderText(ta.value);
          if (!text) { close(); return; }
          const hit = findDuplicate(text);
          const proceed = () => { state.addDump(text); close(); render(); };
          if (hit) showDuplicateConfirm(hit, proceed, () => { ta.focus(); });
          else proceed();
        });
        overlay.addEventListener('click', e => { if (e.target === overlay) close(); });
        document.addEventListener('keydown', escClose);
      }

      paint();
    }

    function viewS7(root) {
      const today = state.getToday() || { items: [], mood: 'okay' };
      const items = (today.items || []).slice();
      const mood = today.mood || 'okay';
      const date = state.todayKey();

      const done = items.filter(i => i.done && !i.isParent);
      const undone = items.filter(i => !i.done && !i.isParent);

      const removedDumpIds = new Set();

      function carryFeeling() {
        const pool = [
          "Hold on to this feeling — it'll get you through tomorrow.",
          "Remember how this day ends. You'll need it.",
          "You did more than you thought you could. Carry that forward.",
          "That feeling of 'I managed it' — keep it close.",
          "The days that surprise you are worth remembering.",
        ];
        const dayOfYear = Math.floor((Date.now() - new Date(new Date().getFullYear(), 0, 0).getTime()) / 86400000);
        return pool[dayOfYear % pool.length];
      }

      function affirmation() {
        const n = done.length;
        const dayOfYear = Math.floor((Date.now() - new Date(new Date().getFullYear(), 0, 0).getTime()) / 86400000);
        const pick = (pool) => pool[dayOfYear % pool.length];

        const pools = {
          overwhelmed: {
            none: [
              "You showed up when everything felt like too much. That's enough.",
              "Starting when you're flooded is its own kind of strength.",
              "You opened this. That's further than yesterday.",
              "Overwhelmed and here anyway. That takes something.",
              "The bar today was showing up. You cleared it.",
            ],
            some: [
              `Overwhelmed and still got ${n} done. That's not nothing.`,
              `You arrived feeling flooded. ${n} ${n === 1 ? 'thing' : 'things'} still happened.`,
              `${n} done, and you were running on fumes. Respect that.`,
              `Felt overwhelmed, still moved. ${n} ticked off.`,
              `${n} done through the fog. That counts as a real day.`,
            ],
          },
          tired: {
            none: [
              "Low energy is real. You still showed up.",
              "Rest is productive. Today still happened.",
              "You opened this tired. That's further than you think.",
              "Tired days count. You were here.",
              "Sometimes holding steady is the whole job.",
            ],
            some: [
              `Tired and still got ${n} done. Real work.`,
              `${n} done on low. That's harder than it looks.`,
              `You arrived depleted. ${n} ${n === 1 ? 'thing' : 'things'} still moved.`,
              `Running low, still shipped ${n}. That's a good day.`,
              `${n} ticked off when you had nothing left. Noted.`,
            ],
          },
          great: {
            none: [
              "Strong start. Tomorrow picks up from here.",
              "Energy was there. Rest when you can.",
              "Momentum is still here when you come back.",
              "Good days need rest too. Come back tomorrow.",
              "You showed up strong. That's the foundation.",
            ],
            some: [
              `${n} done. Strong day.`,
              `${n} ticked off and the energy was there. Build on that.`,
              `Good day. ${n} done. Come back tomorrow.`,
              `${n} things moved. That's the rhythm.`,
              `Strong. ${n} done. Rest well.`,
            ],
          },
          okay: {
            none: [
              "You showed up today. That's the bar.",
              "Okay days are the backbone of this. You were here.",
              "Not every day has a highlight. This one still counted.",
              "Being here is the first move. Tomorrow continues.",
              "You opened this. That's the whole thing some days.",
            ],
            some: [
              `You showed up. ${n} done. The rest is still here when you're ready.`,
              `${n} done on an ordinary day. That's how it gets done.`,
              `${n} ticked off. Steady as it goes.`,
              `Okay day, ${n} done. Come back tomorrow.`,
              `${n} things moved. That's enough.`,
            ],
          },
        };

        const moodPool = pools[mood] || pools.okay;
        return pick(n === 0 ? moodPool.none : moodPool.some);
      }

      function paint() {
        const todayEntryNow = state.getToday() || {};
        if (todayEntryNow.wrapped && todayEntryNow.wrapSnapshot) {
          paintClosed(todayEntryNow.wrapSnapshot);
          return;
        }

        const dump = state.get(KEYS.dumpUnsorted, []);
        const remainingDump = dump.filter(d => !removedDumpIds.has(d.id));

        root.innerHTML = `
          <section class="mt-6">
            <p class="text-xl sm:text-2xl font-medium leading-snug">${escapeHtml(affirmation())}</p>
            ${done.length > 0 ? `<p class="pnp-muted text-sm mt-2">${escapeHtml(carryFeeling())}</p>` : ''}

            <div class="pnp-surface border pnp-border rounded-2xl p-6 sm:p-8 mt-6 space-y-6">
              <div>
                <h2 class="text-sm pnp-muted uppercase tracking-wide">Done today</h2>
                ${done.length === 0
                  ? '<p class="pnp-muted mt-2">Nothing ticked.</p>'
                  : `<ul class="mt-3 space-y-2">${done.map(d => `<li class="flex gap-3"><span class="pnp-accent">✓</span><span>${escapeHtml(renderText(d.text))}</span></li>`).join('')}</ul>`}
              </div>

              ${undone.length > 0 ? `
                <div>
                  <h2 class="text-sm pnp-muted uppercase tracking-wide">Still on your list</h2>
                  <ul class="mt-3 space-y-2">${undone.map(u => `<li class="flex gap-3"><span class="pnp-accent">•</span><span>${escapeHtml(renderText(u.text))}</span></li>`).join('')}</ul>
                  <p class="pnp-muted text-xs mt-2">These move to your parking lot. Find them next time you sort.</p>
                </div>` : ''}

              ${remainingDump.length > 0 ? `
                <div>
                  <h2 class="text-sm pnp-muted uppercase tracking-wide">Today's brain dump</h2>
                  <ul id="pnp-dump-list" class="mt-3 space-y-2">
                    ${remainingDump.map(d => `
                      <li class="flex items-start gap-3">
                        <span class="pnp-accent mt-1">•</span>
                        <span class="flex-1">${escapeHtml(renderText(d.text))}</span>
                        <button data-dump-remove="${escapeHtml(d.id)}" class="pnp-muted text-xs underline hover:opacity-80 shrink-0 mt-1">Remove</button>
                      </li>`).join('')}
                  </ul>
                  <p class="pnp-muted text-xs mt-2">Kept items move to your parking lot. Removed items are discarded.</p>
                </div>` : ''}
            </div>

            <div class="pnp-no-print mt-6 flex flex-wrap items-center gap-3">
              <button id="pnp-close" class="pnp-bg-accent rounded-md px-5 py-2.5 font-medium">Close out</button>
              <button id="pnp-print-summary" class="text-sm pnp-muted underline hover:opacity-80">Print summary</button>
            </div>
          </section>`;

        root.querySelectorAll('[data-dump-remove]').forEach(btn => {
          btn.addEventListener('click', () => {
            removedDumpIds.add(btn.dataset.dumpRemove);
            paint();
          });
        });
        root.querySelector('#pnp-close').addEventListener('click', closeOut);
        root.querySelector('#pnp-print-summary').addEventListener('click', () => window.print());
      }

      function paintClosed(snap) {
        const dateLabel = new Date().toLocaleDateString('en-GB', { weekday: 'long', day: 'numeric', month: 'long' });
        const doneCount = snap && snap.done ? snap.done.length : 0;
        const parkedCount = state.get(KEYS.parked, []).length;
        const doneText = doneCount === 1 ? '1 thing moved forward.' : `${doneCount} things moved forward.`;
        const parkedText = parkedCount === 1 ? '1 item is waiting in your Parking Lot.' : `${parkedCount} items are waiting in your Parking Lot.`;
        root.innerHTML = `
          <section class="mt-6">
            <p class="pnp-muted text-sm uppercase tracking-wide">Reset closed · ${escapeHtml(dateLabel)}</p>
            <div class="pnp-surface border pnp-border rounded-2xl p-6 sm:p-8 mt-4">
              <h1 class="text-2xl sm:text-3xl font-semibold tracking-tight">Today’s reset is closed.</h1>
              <p class="pnp-muted mt-3">
                ${doneCount > 0 ? escapeHtml(doneText) : 'You closed the loop for today.'}
                ${parkedCount > 0 ? escapeHtml(parkedText) : 'Nothing is waiting in your Parking Lot.'}
              </p>
            </div>

            <div class="pnp-no-print mt-4 flex flex-wrap items-center gap-3">
              <button id="pnp-new-session" class="pnp-bg-accent rounded-md px-5 py-2.5 font-medium">Start another session</button>
            </div>
          </section>`;

        root.querySelector('#pnp-new-session').addEventListener('click', () => {
          const snapMood = snap && snap.mood ? snap.mood : 'okay';
          createEmptyTodaySession(snapMood);
          const parked = state.get(KEYS.parked, []);
          if (parked.length > 0) advance('S2C');
          else advance('S3');
        });
      }

      function closeOut() {
        const dump = state.get(KEYS.dumpUnsorted, []);
        const keptDump = dump.filter(d => !removedDumpIds.has(d.id));

        const snapshot = {
          mood,
          done: done.map(d => d.text),
          carriedOver: undone.map(u => u.text),
          keptDump: keptDump.map(d => d.text),
          closedAt: new Date().toISOString(),
        };

        undone.forEach(u => state.addParked(u.text));
        keptDump.forEach(d => state.addParked(d.text));
        state.set(KEYS.dumpUnsorted, []);

        const todayEntry = state.getToday();
        if (todayEntry) {
          todayEntry.items = items.filter(i => i.done && !i.isParent);
          todayEntry.wrapped = true;
          todayEntry.wrapSnapshot = snapshot;
          state.setToday(todayEntry);
        }

        screenHistory = [];
        advance('S7', { replace: true });
      }

      paint();
    }

    const views = {
      S0: viewS0,
      S1: viewS1,
      S2: viewS2,
      S2C: viewS2C,
      S3: viewS3,
      S4: viewS4,
      S5: viewS5,
      S6: viewS6,
      S7: viewS7,
    };

    let currentScreen = 'S2';
    let screenOpts = {};
    let screenHistory = [];

    function render() {
      const root = document.getElementById('pnp-app');
      root.innerHTML = `
        <p class="pnp-brand" aria-hidden="true">Paper N Pixels</p>
        <div class="pnp-no-print min-h-10 flex items-center justify-between">
          ${canGoBack() ? '<button id="pnp-back" class="pnp-muted text-sm underline hover:opacity-80">Back</button>' : '<span></span>'}
          <span class="pnp-eyebrow pnp-eyebrow--inline">Daily Reset</span>
        </div>
        <div id="pnp-screen"></div>`;
      const screen = root.querySelector('#pnp-screen');
      const view = views[currentScreen] || views.S2;
      view(screen);
      const back = root.querySelector('#pnp-back');
      if (back) back.addEventListener('click', goBack);
    }

    function canGoBack() {
      const today = state.getToday();
      if (currentScreen === 'S7' && today && today.wrapped) return false;
      return screenHistory.length > 0 && currentScreen !== 'S1' && currentScreen !== 'S0';
    }

    function goBack() {
      const prev = screenHistory.pop();
      if (!prev) return;
      currentScreen = prev.screen;
      screenOpts = prev.opts || {};
      render();
    }

    function advance(target, opts = {}) {
      if (!SCREENS.includes(target)) return;
      if (!opts.replace && target !== currentScreen) {
        screenHistory.push({ screen: currentScreen, opts: screenOpts });
        if (screenHistory.length > 12) screenHistory = screenHistory.slice(-12);
      }
      currentScreen = target;
      const { replace: _replace, ...nextOpts } = opts;
      screenOpts = nextOpts;
      render();
    }

    /* ---------- settings drawer wiring ---------- */

    function bindSettingsUI() {
      const drawer  = document.getElementById('pnp-settings');
      const openBtn = document.getElementById('pnp-settings-open');
      const closeBtn= document.getElementById('pnp-settings-close');

      const fields = {
        theme:           document.getElementById('pnp-set-theme'),
        motion:          document.getElementById('pnp-set-motion'),
        showDateOnToday: document.getElementById('pnp-set-showdate'),
      };

      function loadInto() {
        const s = state.get(KEYS.settings, defaultSettings);
        fields.theme.value           = s.theme;
        fields.motion.value          = s.motion;
        fields.showDateOnToday.checked = !!s.showDateOnToday;
      }

      function persist(patch) {
        const s = state.get(KEYS.settings, defaultSettings);
        state.set(KEYS.settings, { ...s, ...patch });
        applyTheme();
      }

      fields.theme.addEventListener('change', e => persist({ theme: e.target.value }));
      fields.motion.addEventListener('change', e => persist({ motion: e.target.value }));
      fields.showDateOnToday.addEventListener('change', e => persist({ showDateOnToday: e.target.checked }));

      function setOpen(open) {
        drawer.dataset.open = open ? 'true' : 'false';
        drawer.setAttribute('aria-hidden', open ? 'false' : 'true');
        openBtn.setAttribute('aria-expanded', open ? 'true' : 'false');
      }
      openBtn.addEventListener('click', () => { loadInto(); setOpen(true); });
      closeBtn.addEventListener('click', () => setOpen(false));
      document.addEventListener('keydown', e => { if (e.key === 'Escape') setOpen(false); });

      const resetBtn = document.getElementById('pnp-set-reset');
      const resetTodayBtn = document.getElementById('pnp-set-reset-today');
      resetTodayBtn.addEventListener('click', () => {
        const ok = window.confirm("Reset today's tasks and brain dump? Your name, settings, and parking lot stay saved.");
        if (!ok) return;
        state.remove(state.todayEntryKey());
        state.set(KEYS.dumpUnsorted, []);
        screenHistory = [];
        sessionFlags.newSessionMode = true;
        setOpen(false);
        advance('S2', { replace: true });
      });
      resetBtn.addEventListener('click', () => {
        const ok = window.confirm("This wipes everything on this device: name, parked items, today's plan, settings. Continue?");
        if (!ok) return;
        storage.keys().filter(k => k.startsWith('pnp.')).forEach(k => storage.removeItem(k));
        window.location.reload();
      });

      loadInto();
    }

    /* ---------- boot ---------- */

    function markVisited() {
      state.set(KEYS.lastVisit, state.todayKey());
    }

    function boot() {
      state.ensureSchema();
      bootPrevVisit = state.get(KEYS.lastVisit);
      const tEntry = state.getToday();
      if (tEntry && Array.isArray(tEntry.items) && tEntry.items.some(i => i.locked)) {
        tEntry.items = tEntry.items.map(i => { const { locked: _l, ...rest } = i; return rest; });
        state.setToday(tEntry);
      }
      runDecay();
      applyTheme();
      bindSettingsUI();
      markOpenedToday();
      currentScreen = detectEntryScreen();
      render();
      markVisited();

      const colourScheme = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)');
      if (colourScheme && colourScheme.addEventListener) {
        colourScheme.addEventListener('change', applyTheme);
      }
    }

    // Dev shim — visible from console for manual testing in Phase 1.
    window.__pnp = { state, KEYS, defaultSettings, detectEntryScreen, applyTheme, render, get currentScreen() { return currentScreen; } };

    try {
      boot();
    } catch (err) {
      console.error(err);
      document.getElementById('pnp-app').innerHTML = `
        <section class="pnp-surface border pnp-border rounded-2xl p-6 sm:p-8 mt-6">
          <h1 class="text-2xl font-semibold tracking-tight">Daily Reset could not start.</h1>
          <p class="pnp-muted mt-3">Open this file through the local preview link, or clear this browser's saved data and reload.</p>
        </section>`;
    }
  
  </script>

</body>
</html>
