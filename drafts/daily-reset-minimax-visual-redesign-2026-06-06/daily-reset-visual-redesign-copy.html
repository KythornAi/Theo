<!doctype html>
<!--
This is a visual redesign copy only. Original flow and logic preserved.
Source: KythornAi/paper-n-pixels theo/daily-reset-preview product/daily-reset/index.html
Date:   2026-06-06
For:    Paper N Pixels / Mindful Not Mythical
Notes:  Visual redesign only. All IDs, classes, localStorage keys, JS logic,
        button actions, settings behaviour, timer behaviour, parking lot
        behaviour, wrap-up behaviour, and accessibility wiring are unchanged.
-->
<html lang="en-GB">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#f4ede0" />
  <meta name="description" content="A daily reset. Get it out of your head, sort what matters, wrap up, and come back tomorrow. No streak, no score, no judgement." />
  <title>The Daily Reset</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght,SOFT@0,9..144,300..600,0..100;1,9..144,300..600,0..100&family=Inter:wght@400;500;600;700&display=swap" />
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* =====================================================================
       VISUAL DIRECTION (Daily Reset redesign)
       Page:        warm cream, slightly more yellow than the previous build.
                    Calm editorial feel, premium spacing.
       Cards:       two depths, "warm" and "warm-soft", with a thin tan rule
                    and a single terracotta accent stripe on the focus card.
       Type:        editorial serif display (Fraunces, opsz 96) for headings
                    paired with humanist sans (Inter) for body. Italic optical
                    for the welcome word, tracked small-caps for the eyebrow.
       Accents:     forest (primary action), terracotta (notice, dot, ring),
                    ochre (warm), dusty rose (quiet), sage (cool), aubergine
                    (tender). Accents are decoration on cards, numerals, and
                    the small ornament dot. Body text never sits on an accent
                    below 4.5:1 contrast.
       ===================================================================== */

    :root {
      --cream:        #f4ede0;
      --warm:         #ece1cc;
      --warm-soft:    #efe7d6;

      --ink:          #322133;
      --ink-heading:  #2a3a2f;
      --ink-hint:     #4a523a;
      --ink-muted:    #6e6a5a;

      /* action / focus colours */
      --forest:       #2a3a2f;
      --terracotta:   #b04a2c;
      --ochre:        #876228;
      --dusty-rose:   #a86868;
      --sage:         #556347;
      --aubergine:    #6a3a52;
      --teal:         #4a7572;

      /* rules */
      --rule-soft:    #c8b693;
      --rule-tan:     #c8a784;
      --rule-line:    #b9a784;

      /* legacy pnp variables — kept so existing class names in the JS still
         resolve to the new editorial palette. */
      --pnp-primary:    var(--terracotta);
      --pnp-secondary:  var(--cream);
      --pnp-tertiary:   var(--warm);
      --pnp-neutral:    var(--ink);
      --pnp-muted:      var(--ink-muted);
      --pnp-line:       var(--rule-tan);
      --pnp-accent:     var(--forest);
      --pnp-bg:         var(--cream);
      --pnp-surface:    var(--warm);
      --pnp-text:       var(--ink);

      --serif:        "Fraunces", "Cormorant Garamond", "Iowan Old Style", Georgia, "Times New Roman", serif;
      --sans:         "Inter", "Helvetica Neue", "Segoe UI", system-ui, -apple-system, sans-serif;

      --maxw:         620px;
    }

    /* Dark mode still resolves to a warm dark, but the restyle here is the
       light editorial system. Kept for backwards compatibility. */
    [data-theme="dark"] {
      --cream:        #1f1d1a;
      --warm:         #29251f;
      --warm-soft:    #25211c;
      --ink:          #ece5d4;
      --ink-heading:  #e3d8bf;
      --ink-hint:     #b9ad94;
      --ink-muted:    #94897a;
      --rule-soft:    #443c30;
      --rule-tan:     #4f4536;
      --rule-line:    #5a4f3e;
      --pnp-primary:    #f0a886;
      --pnp-secondary:  #1f1d1a;
      --pnp-tertiary:   #29251f;
      --pnp-neutral:    #ece5d4;
      --pnp-muted:      #94897a;
      --pnp-line:       rgba(255,255,255,0.10);
      --pnp-accent:     #d4a07c;
      --pnp-bg:         #1f1d1a;
      --pnp-surface:    #29251f;
      --pnp-text:       #ece5d4;
    }

    [data-accent="warm"]   { --pnp-accent: var(--terracotta); }
    [data-accent="cool"]   { --pnp-accent: var(--sage); }
    [data-accent="amber"]  { --pnp-accent: var(--ochre); }
    [data-theme="dark"][data-accent="warm"]  { --pnp-accent: #f0a886; }
    [data-theme="dark"][data-accent="cool"]  { --pnp-accent: #7ea49a; }
    [data-theme="dark"][data-accent="amber"] { --pnp-accent: #d4a858; }

    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    html { -webkit-text-size-adjust: 100%; }
    body {
      background: var(--cream);
      color: var(--ink);
      font-family: var(--sans);
      font-size: 17px;
      line-height: 1.55;
      min-height: 100vh;
      min-height: 100dvh;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }
    :focus { outline: none; }
    :focus-visible {
      outline: 2px solid var(--terracotta);
      outline-offset: 3px;
      border-radius: 6px;
    }

    /* =====================================================================
       LAYOUT
       ===================================================================== */
    .pnp-app-wrap {
      max-width: var(--maxw);
      margin: 0 auto;
      padding: 30px 22px 96px;
    }
    .pnp-stack > * + * { margin-top: 14px; }
    .pnp-stack-lg > * + * { margin-top: 22px; }

    /* brand slot at the top of every screen — small italic wordmark
       flanked by a single rule, in the spirit of the body stress scan. */
    .pnp-brand {
      text-align: center;
      color: var(--ink-muted);
      font-family: var(--serif);
      font-size: 13px;
      font-style: italic;
      letter-spacing: 0.04em;
      margin: 0 0 18px;
      opacity: 0.9;
    }
    .pnp-brand::before, .pnp-brand::after {
      content: "";
      display: inline-block;
      width: 22px;
      height: 1px;
      background: var(--rule-line);
      vertical-align: middle;
      margin: 0 10px;
      opacity: 0.6;
    }

    /* =====================================================================
       EDITORIAL EYEBROW + HEADINGS
       ===================================================================== */
    .pnp-eyebrow {
      font-family: var(--sans);
      font-size: 11.5px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--ink-muted);
      font-weight: 600;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }
    .pnp-eyebrow::before {
      content: "";
      display: inline-block;
      width: 6px;
      height: 6px;
      background: var(--terracotta);
      border-radius: 50%;
    }
    .pnp-eyebrow--inline { margin: 0; }

    /* Editorial display headings — used by both the new top bar and any
       heading the JS renders. Tailwind font-semibold becomes editorial
       weight 400 with optical sizing. */
    h1, h2, h3,
    .text-2xl, .text-3xl, .text-4xl, .text-5xl,
    [class*="text-2xl"], [class*="text-3xl"], [class*="text-4xl"] {
      font-family: var(--serif);
      color: var(--ink-heading);
      font-weight: 400;
      letter-spacing: -0.01em;
      font-variation-settings: "opsz" 96, "SOFT" 50;
    }
    h1, .text-3xl { line-height: 1.05; }
    h2, .text-2xl { line-height: 1.12; }
    h3, .text-xl  { line-height: 1.2; }
    .text-xl { font-family: var(--serif); font-weight: 400; }

    /* Italic optical for accent words inside headings the JS produces.
       Used sparingly, only where the heading colour also changes. */
    em, .pnp-italic {
      font-style: italic;
      font-variation-settings: "opsz" 96, "SOFT" 100;
      color: var(--aubergine);
    }

    /* =====================================================================
       pnp-* LEGACY CLASSES (used by the unchanged JS view functions)
       ===================================================================== */
    .pnp-surface { background: var(--pnp-surface); }
    .pnp-muted   { color: var(--pnp-muted); }
    .pnp-accent  { color: var(--pnp-accent); }
    .pnp-bg-accent {
      background: var(--forest);
      color: var(--cream);
      border: 1.5px solid var(--forest);
    }
    .pnp-bg-accent:hover { background: #1c2a20; }
    .pnp-border  { border-color: var(--rule-tan); }

    /* The JS uses Tailwind border + pnp-border together. The bare Tailwind
       border class defaults to gray-200, so override to the tan rule. */
    .border { border-color: var(--rule-tan); }
    .border.pnp-border { border-color: var(--rule-tan); }

    /* Default Tailwind white background was overriding pnp-surface. Force
       the warm card colour on white-bg surface variants. */
    .bg-white { background-color: var(--warm); }

    /* The "Settings" drawer and overlay cards used pnp-surface, which
       now reads as the warm card surface — perfect for the editorial feel. */

    /* =====================================================================
       BUTTONS (used by the JS)
       ===================================================================== */
    /* The JS creates pnp-bg-accent buttons in many sizes. Give them a
       consistent editorial shape. */
    .pnp-bg-accent {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font-family: var(--sans);
      font-weight: 600;
      letter-spacing: 0.01em;
      line-height: 1.2;
      padding: 12px 22px;
      border-radius: 999px;
      cursor: pointer;
      min-height: 44px;
      transition: background 180ms ease, color 180ms ease, transform 180ms ease, border-color 180ms ease;
    }
    .pnp-bg-accent:active { transform: translateY(1px); }
    button.pnp-bg-accent:disabled,
    .pnp-bg-accent[disabled] { opacity: 0.4; cursor: not-allowed; }

    /* The JS also creates pnp-surface bordered buttons as the secondary
       "ghost" action. Restyle them as ghost buttons. */
    button.pnp-surface {
      background: transparent;
      color: var(--ink-heading);
      border: 1.5px solid var(--ink-heading);
      border-radius: 999px;
      padding: 10px 18px;
      font-weight: 600;
      cursor: pointer;
      transition: background 180ms ease, color 180ms ease;
      min-height: 42px;
    }
    button.pnp-surface:hover { background: var(--ink-heading); color: var(--cream); }

    /* Tailwind's text-utility underline ("Maybe later" / "Skip") used as
       the soft tertiary action. */
    button[class*="underline"],
    a[class*="underline"] {
      font-family: var(--sans);
      color: var(--ink-hint);
      background: transparent;
      border: 0;
      padding: 8px 4px;
      cursor: pointer;
      text-decoration: underline;
      text-underline-offset: 3px;
      min-height: 36px;
      font-size: 14px;
    }
    button[class*="underline"]:hover,
    a[class*="underline"]:hover { color: var(--ink); }

    /* =====================================================================
       CARDS (used by the JS as: pnp-surface border pnp-border rounded-2xl)
       ===================================================================== */
    .rounded-2xl, .rounded-xl, .rounded-md, .rounded-lg {
      border-radius: 14px;
    }
    /* The "card" pattern: pnp-surface border pnp-border rounded-2xl p-6
       Tailwind's default border-radius was 1rem (16px); the new system
       uses 14px, slightly softer. */

    /* Accent stripe on the primary card (sort / today list). */
    .pnp-card-accent { position: relative; padding-top: 28px; }
    .pnp-card-accent::before {
      content: "";
      position: absolute;
      top: 0; left: 18px; right: 18px;
      height: 3px;
      background: linear-gradient(90deg,
        var(--forest) 0%, var(--aubergine) 28%, var(--terracotta) 55%, var(--ochre) 78%, var(--teal) 100%);
      border-radius: 0 0 2px 2px;
      opacity: 0.9;
    }

    /* =====================================================================
       INPUTS (textareas, text inputs the JS renders)
       ===================================================================== */
    textarea, input[type="text"] {
      font-family: var(--sans);
      color: var(--ink);
      background: var(--warm-soft);
      border: 1px solid var(--rule-tan);
      border-radius: 12px;
      padding: 14px 16px;
      font-size: 16px;
      line-height: 1.45;
      width: 100%;
      outline: none;
      transition: border-color 180ms ease, background 180ms ease;
    }
    textarea::placeholder, input[type="text"]::placeholder {
      color: var(--ink-muted);
      font-style: italic;
    }
    textarea:focus, input[type="text"]:focus {
      border-color: var(--forest);
      background: var(--cream);
    }

    /* =====================================================================
       TOP BAR (back + label)
       ===================================================================== */
    #pnp-back {
      font-family: var(--sans);
      color: var(--ink-hint);
      background: transparent;
      border: 0;
      padding: 8px 4px;
      cursor: pointer;
      text-decoration: underline;
      text-underline-offset: 3px;
      font-size: 14px;
    }
    #pnp-back:hover { color: var(--ink); }

    /* =====================================================================
       DRAWER + FLOATING BUTTONS
       ===================================================================== */
    .pnp-drawer {
      transform: translateX(100%);
      transition: transform 220ms ease;
    }
    .pnp-drawer[data-open="true"] { transform: translateX(0); }

    /* Settings open button (the gear) — restyled as a small icon button. */
    #pnp-settings-open {
      background: var(--warm);
      border: 1px solid var(--rule-tan);
      color: var(--ink-heading);
      width: 40px;
      height: 40px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: background 180ms ease, border-color 180ms ease;
    }
    #pnp-settings-open:hover { border-color: var(--forest); }

    /* The "+" FAB used on the today list screen. */
    #pnp-fab {
      background: var(--forest);
      color: var(--cream);
      width: 56px;
      height: 56px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: 0;
      cursor: pointer;
      box-shadow: 0 6px 20px rgba(42, 58, 47, 0.18);
      transition: background 180ms ease, transform 180ms ease;
    }
    #pnp-fab:hover { background: #1c2a20; }
    #pnp-fab:active { transform: translateY(1px); }

    /* Overlays (stuck, timer, fab dump, etc.). */
    .pnp-overlay {
      position: fixed;
      inset: 0;
      z-index: 50;
      display: flex;
      align-items: end;
      justify-content: center;
      padding: 16px;
      background: rgba(20, 16, 14, 0.55);
    }
    @media (min-width: 640px) {
      .pnp-overlay { align-items: center; }
    }
    .pnp-overlay__card {
      background: var(--warm);
      border: 1px solid var(--rule-tan);
      border-radius: 16px;
      padding: 24px 22px;
      width: 100%;
      max-width: 460px;
      max-height: 100%;
      overflow-y: auto;
    }

    /* Toast */
    #pnp-toast {
      background: var(--warm);
      border: 1px solid var(--rule-tan);
      border-radius: 999px;
      box-shadow: 0 6px 20px rgba(20, 16, 14, 0.18);
    }
    #pnp-toast button {
      color: var(--forest);
      font-weight: 600;
    }

    /* =====================================================================
       EDITORIAL DIVIDERS
       ===================================================================== */
    .pnp-divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 22px 0;
      color: var(--ink-muted);
    }
    .pnp-divider::before, .pnp-divider::after {
      content: "";
      flex: 1;
      height: 1px;
      background: var(--rule-line);
      opacity: 0.6;
    }
    .pnp-divider span {
      font-family: var(--serif);
      font-style: italic;
      font-size: 14px;
      color: var(--ink-hint);
    }

    /* =====================================================================
       BANNERS (yesterday, sunday, overflow, plus-one)
       ===================================================================== */
    #pnp-banner-yesterday,
    #pnp-banner-sunday,
    #pnp-plusone {
      background: var(--warm-soft);
      border: 1px solid var(--rule-tan);
      border-radius: 12px;
      padding: 14px 16px;
    }
    #pnp-banner-overflow { color: var(--ink-muted); }

    /* =====================================================================
       TIMER (inside tiny timer overlay)
       ===================================================================== */
    [data-timer-display] {
      font-family: var(--serif);
      color: var(--ink-heading);
      font-weight: 400;
      font-variation-settings: "opsz" 96, "SOFT" 50;
      font-variant-numeric: tabular-nums;
      font-size: 48px;
      line-height: 1;
    }
    [data-timer-note] { color: var(--ink-hint); font-style: italic; font-size: 13px; }

    /* =====================================================================
       MOOD + SORT CARDS (mood chooser on S2, sort items on S4)
       ===================================================================== */
    [data-mood], [data-pick], [data-stuck-pick], [data-plus-pick] {
      transition: border-color 180ms ease, background 180ms ease, transform 180ms ease;
    }
    [data-mood]:hover, [data-pick]:hover,
    [data-stuck-pick]:hover, [data-plus-pick]:hover {
      border-color: var(--forest);
      background: var(--warm-soft);
    }
    [data-mood]:active, [data-pick]:active,
    [data-stuck-pick]:active, [data-plus-pick]:active { transform: translateY(1px); }

    /* "stuck" pnp-bg-accent button — let the JS still treat it as primary. */
    #pnp-stuck {
      font-family: var(--sans);
      font-size: 14px;
      color: var(--ink-heading);
      background: transparent;
      border: 1.5px solid var(--ink-heading);
      border-radius: 999px;
      padding: 10px 18px;
      font-weight: 600;
      cursor: pointer;
    }
    #pnp-stuck:hover { background: var(--ink-heading); color: var(--cream); }

    /* =====================================================================
       SETTINGS DRAWER (restyled for editorial feel; IDs preserved)
       ===================================================================== */
    #pnp-settings {
      background: var(--warm);
      border-left: 1px solid var(--rule-tan);
      box-shadow: -12px 0 32px rgba(20, 16, 14, 0.12);
    }
    #pnp-settings h2 {
      font-family: var(--serif);
      color: var(--ink-heading);
      font-weight: 400;
    }
    #pnp-settings label {
      font-family: var(--sans);
      color: var(--ink);
      font-weight: 600;
      font-size: 13px;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }
    #pnp-set-theme,
    #pnp-set-motion {
      background: var(--cream);
      border: 1px solid var(--rule-tan);
      border-radius: 10px;
      padding: 10px 12px;
      font-family: var(--sans);
      color: var(--ink);
      font-size: 15px;
    }
    #pnp-set-theme:focus,
    #pnp-set-motion:focus { border-color: var(--forest); }
    #pnp-set-showdate { accent-color: var(--forest); }
    #pnp-set-reset-today, #pnp-set-reset {
      font-family: var(--sans);
      color: var(--ink-hint);
      background: transparent;
      border: 0;
      padding: 6px 0;
      cursor: pointer;
      text-decoration: underline;
      text-underline-offset: 3px;
      font-size: 13px;
    }
    #pnp-set-reset-today:hover, #pnp-set-reset:hover { color: var(--terracotta); }
    #pnp-settings-close {
      font-family: var(--sans);
      color: var(--ink-hint);
      background: transparent;
      border: 0;
      padding: 6px 10px;
      cursor: pointer;
      font-size: 16px;
    }
    #pnp-settings-close:hover { color: var(--ink); }

    /* =====================================================================
       PRINT
       ===================================================================== */
    @media print {
      body { background: #FFFFFF; color: #1A1A1A; }
      .pnp-no-print { display: none !important; }
    }

    /* =====================================================================
       MOTION
       ===================================================================== */
    :focus-visible {
      outline: 2px solid var(--terracotta);
      outline-offset: 3px;
    }
    [data-motion="reduced"] *,
    [data-motion="reduced"] *::before,
    [data-motion="reduced"] *::after {
      animation-duration: 0ms !important;
      transition-duration: 0ms !important;
    }
    @media (prefers-reduced-motion: reduce) {
      [data-motion="auto"] *,
      [data-motion="auto"] *::before,
      [data-motion="auto"] *::after {
        animation-duration: 0ms !important;
        transition-duration: 0ms !important;
      }
    }

    /* Drop cap utility for the first paragraph of any welcome screen. */
    .pnp-dropcap::first-letter {
      font-family: var(--serif);
      font-size: 56px;
      line-height: 0.9;
      float: left;
      padding: 6px 8px 0 0;
      color: var(--aubergine);
      font-weight: 400;
      font-style: italic;
      font-variation-settings: "opsz" 96, "SOFT" 100;
    }
  </style>
</head>
<body data-theme="light" data-accent="warm" data-motion="auto">

  <main id="pnp-app" class="pnp-app-wrap">
    <!-- Screens render here. The JS render() function injects a brand-slot
         above each screen. -->
  </main>

  <!-- Settings drawer (visually restyled; IDs and class names unchanged) -->
  <aside id="pnp-settings"
         class="pnp-no-print pnp-drawer fixed top-0 right-0 h-full w-full sm:w-96 shadow-2xl z-40 overflow-y-auto"
         data-open="false"
         aria-hidden="true"
         aria-label="Settings">
    <div class="px-5 py-5 border-b pnp-border flex items-center justify-between">
      <h2 class="text-2xl font-semibold">Settings</h2>
      <button id="pnp-settings-close"
              class="rounded-full hover:opacity-70"
              aria-label="Close settings">&#x2715;</button>
    </div>

    <div class="p-5 space-y-6 text-sm">
      <section>
        <label class="block font-medium mb-2">Theme</label>
        <select id="pnp-set-theme" class="w-full border pnp-border rounded-md p-2">
          <option value="auto">Follow OS</option>
          <option value="light">Light</option>
          <option value="dark">Dark</option>
        </select>
      </section>

      <section>
        <label class="block font-medium mb-2">Motion</label>
        <select id="pnp-set-motion" class="w-full border pnp-border rounded-md p-2">
          <option value="auto">Follow OS</option>
          <option value="full">Full</option>
          <option value="reduced">Reduced</option>
        </select>
      </section>

      <section class="space-y-2">
        <label class="flex items-center gap-2">
          <input type="checkbox" id="pnp-set-showdate" />
          <span>Show today's date</span>
        </label>
      </section>

      <section class="pt-4 border-t pnp-border">
        <p class="pnp-muted text-xs italic">Everything stays on this device. Nothing is sent anywhere.</p>
        <button id="pnp-set-reset-today" class="mt-3 block text-xs pnp-muted underline hover:opacity-80">
          Reset today's tasks
        </button>
        <button id="pnp-set-reset" class="mt-3 text-xs pnp-muted underline hover:opacity-80">
          Reset all data on this device
        </button>
      </section>
    </div>
  </aside>

  <button id="pnp-settings-open"
          class="pnp-no-print fixed top-4 right-4 z-30 rounded-full shadow-sm hover:opacity-80"
          aria-controls="pnp-settings"
          aria-expanded="false"
          aria-label="Open settings">&#x2699;</button>

  <script type="module">

    /* ---------- state ---------- */

    const KEYS = {
      version:          'pnp.version',
      user:             'pnp.user',
      welcomeShown:     'pnp.welcomeShown',
      settings:         'pnp.settings',
      lastVisit:        'pnp.lastVisit',
      dumpUnsorted:     'pnp.dump.unsorted',
      parked:           'pnp.parked',
      themeWeek:        'pnp.theme.weekStart',
    };
    const SCHEMA_VERSION = '2';

    const defaultSettings = {
      theme: 'auto',
      themeLocked: null,
      motion: 'auto',
      showDateOnToday: true,
    };

    const memoryStore = new Map();
    const storage = {
      getItem(key) {
        try { return window.localStorage.getItem(key); }
        catch { return memoryStore.has(key) ? memoryStore.get(key) : null; }
      },
      setItem(key, value) {
        try { window.localStorage.setItem(key, value); }
        catch { memoryStore.set(key, value); }
      },
      removeItem(key) {
        try { window.localStorage.removeItem(key); }
        catch { memoryStore.delete(key); }
      },
      keys() {
        try { return Object.keys(window.localStorage); }
        catch { return Array.from(memoryStore.keys()); }
      },
    };

    const state = {
      get(key, fallback = null) {
        const raw = storage.getItem(key);
        if (raw === null) return fallback;
        try { return JSON.parse(raw); } catch { return fallback; }
      },
      set(key, value) {
        storage.setItem(key, JSON.stringify(value));
      },
      remove(key) { storage.removeItem(key); },

      todayKey(d = new Date()) {
        const y = d.getFullYear();
        const m = String(d.getMonth() + 1).padStart(2, '0');
        const day = String(d.getDate()).padStart(2, '0');
        return `${y}-${m}-${day}`;
      },
      todayEntryKey(date = state.todayKey()) { return `pnp.today.${date}`; },
      dayMetaKey(date = state.todayKey()) { return `pnp.dayMeta.${date}`; },
      getToday(date = state.todayKey()) { return state.get(state.todayEntryKey(date), null); },
      setToday(entry, date = state.todayKey()) { state.set(state.todayEntryKey(date), entry); },
      getDayMeta(date = state.todayKey()) { return state.get(state.dayMetaKey(date), { openCount: 0, lastOpenedAt: null }); },
      setDayMeta(meta, date = state.todayKey()) { state.set(state.dayMetaKey(date), meta); },

      ensureSchema() {
        const v = state.get(KEYS.version);
        if (v !== SCHEMA_VERSION) {
          state.set(KEYS.version, SCHEMA_VERSION);
        }
        const settings = state.get(KEYS.settings);
        if (!settings) state.set(KEYS.settings, defaultSettings);
        else state.set(KEYS.settings, { ...defaultSettings, ...settings });

        if (!state.get(KEYS.dumpUnsorted)) state.set(KEYS.dumpUnsorted, []);
        if (!state.get(KEYS.parked)) state.set(KEYS.parked, []);
      },
    };

    function cryptoId() {
      if (window.crypto && window.crypto.randomUUID) return window.crypto.randomUUID();
      return 'd_' + Math.random().toString(36).slice(2) + Date.now().toString(36);
    }

    state.setUser = (name) => state.set(KEYS.user, { name: name || null, createdAt: new Date().toISOString() });

    state.setMood = (mood) => {
      const date = state.todayKey();
      const entry = state.getToday(date) || { mood: null, items: [], dumpEntries: [], wrapped: false, plusOneDismissed: false };
      entry.mood = mood;
      state.setToday(entry, date);
    };

    state.addDump = (text) => {
      const dump = state.get(KEYS.dumpUnsorted, []);
      const entry = { id: cryptoId(), text, createdAt: new Date().toISOString() };
      dump.push(entry);
      state.set(KEYS.dumpUnsorted, dump);
      return entry.id;
    };

    state.updateDump = (id, text) => {
      const dump = state.get(KEYS.dumpUnsorted, []);
      const idx = dump.findIndex(e => e.id === id);
      if (idx >= 0) {
        dump[idx] = { ...dump[idx], text };
        state.set(KEYS.dumpUnsorted, dump);
      }
    };

    state.removeDump = (id) => {
      const dump = state.get(KEYS.dumpUnsorted, []);
      state.set(KEYS.dumpUnsorted, dump.filter(e => e.id !== id));
    };

    state.addTodayItem = (text) => {
      const date = state.todayKey();
      const entry = state.getToday(date) || { mood: null, items: [], dumpEntries: [], wrapped: false, plusOneDismissed: false };
      if (todayListCount(entry) >= 4) return null;
      entry.items.push({ id: cryptoId(), text, done: false });
      state.setToday(entry, date);
      return entry.items[entry.items.length - 1].id;
    };

    state.setTodayItems = (items) => {
      const date = state.todayKey();
      const entry = state.getToday(date) || { mood: null, items: [], dumpEntries: [], wrapped: false, plusOneDismissed: false };
      entry.items = items;
      state.setToday(entry, date);
    };

    state.toggleTodayItem = (itemId) => {
      const date = state.todayKey();
      const entry = state.getToday(date);
      if (!entry) return;
      const it = entry.items.find(i => i.id === itemId);
      if (!it) return;
      it.done = !it.done;
      state.setToday(entry, date);
    };

    state.addParked = (text) => {
      const parked = state.get(KEYS.parked, []);
      const now = new Date().toISOString();
      const item = { id: cryptoId(), text, parkedAt: now, lastTouched: now };
      parked.push(item);
      state.set(KEYS.parked, parked);
      return item.id;
    };

    state.refreshParkedTouched = (parkedId) => {
      const parked = state.get(KEYS.parked, []);
      const idx = parked.findIndex(p => p.id === parkedId);
      if (idx >= 0) {
        parked[idx] = { ...parked[idx], lastTouched: new Date().toISOString() };
        state.set(KEYS.parked, parked);
      }
    };

    state.removeParked = (parkedId) => {
      const parked = state.get(KEYS.parked, []);
      state.set(KEYS.parked, parked.filter(p => p.id !== parkedId));
    };

    /* ---------- render rule ---------- */

    function renderText(s) {
      if (!s) return '';
      const trimmed = String(s).trim();
      if (!trimmed) return '';
      return trimmed.charAt(0).toUpperCase() + trimmed.slice(1);
    }

    function todayListCount(entry = state.getToday()) {
      if (!entry || !Array.isArray(entry.items)) return 0;
      return entry.items.filter(item => !item.parentId).length;
    }

    function todayHasRoom(entry = state.getToday()) {
      return todayListCount(entry) < 4;
    }

    function createEmptyTodaySession(mood = 'okay') {
      state.remove(state.todayEntryKey());
      state.set(KEYS.dumpUnsorted, []);
      state.setToday({
        mood,
        items: [],
        dumpEntries: [],
        wrapped: false,
        plusOneDismissed: true,
      });
      sessionFlags.newSessionMode = true;
      screenHistory = [];
    }

    /* ---------- theme ---------- */

    function isoWeekKey(d = new Date()) {
      const target = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
      const dayNum = (target.getUTCDay() + 6) % 7;
      target.setUTCDate(target.getUTCDate() - dayNum + 3);
      const firstThursday = new Date(Date.UTC(target.getUTCFullYear(), 0, 4));
      const week = 1 + Math.round(
        ((target - firstThursday) / 86400000 - 3 + ((firstThursday.getUTCDay() + 6) % 7)) / 7
      );
      return `${target.getUTCFullYear()}-W${String(week).padStart(2, '0')}`;
    }

    const ACCENTS = ['warm', 'cool', 'amber'];

    function pickWeeklyAccent() {
      const settings = state.get(KEYS.settings, defaultSettings);
      if (settings.themeLocked) return settings.themeLocked;
      return 'cool';
    }

    function resolveThemeMode(setting) {
      if (setting === 'light' || setting === 'dark') return setting;
      return window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
    }

    function applyTheme() {
      const settings = state.get(KEYS.settings, defaultSettings);
      const mode = resolveThemeMode(settings.theme);
      const accent = pickWeeklyAccent();
      document.body.dataset.theme = mode;
      document.body.dataset.accent = accent;
      document.body.dataset.motion = settings.motion;
    }

    /* ---------- parking lot ---------- */

    function runDecay() {
      // V1 never auto-deletes parked items. Users decide what to keep or remove.
    }

    /* ---------- ics ---------- */

    const ics = {
      pad(n) { return String(n).padStart(2, '0'); },
      utcStamp() {
        const d = new Date();
        return `${d.getUTCFullYear()}${ics.pad(d.getUTCMonth()+1)}${ics.pad(d.getUTCDate())}T${ics.pad(d.getUTCHours())}${ics.pad(d.getUTCMinutes())}${ics.pad(d.getUTCSeconds())}Z`;
      },
      esc(s) {
        return String(s == null ? '' : s)
          .replace(/\\/g, '\\\\')
          .replace(/;/g, '\\;')
          .replace(/,/g, '\\,')
          .replace(/\n/g, '\\n');
      },
      build(date, items) {
        const dateNoDash = date.replace(/-/g, '');
        const stamp = ics.utcStamp();
        const events = items.map(item =>
          [
            'BEGIN:VEVENT',
            `UID:${(item.id || cryptoId())}@papernpixels.local`,
            `DTSTAMP:${stamp}`,
            `DTSTART;VALUE=DATE:${dateNoDash}`,
            `SUMMARY:${ics.esc(renderText(item.text))}`,
            'END:VEVENT',
          ].join('\r\n')
        ).join('\r\n');
        return [
          'BEGIN:VCALENDAR',
          'VERSION:2.0',
          'PRODID:-//Paper N Pixels//Daily Reset v2//EN',
          'CALSCALE:GREGORIAN',
          'METHOD:PUBLISH',
          events,
          'END:VCALENDAR',
          '',
        ].join('\r\n');
      },
      download(date, items) {
        if (!items || items.length === 0) return;
        const blob = new Blob([ics.build(date, items)], { type: 'text/calendar;charset=utf-8' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `daily-reset-${date}.ics`;
        document.body.appendChild(a);
        a.click();
        setTimeout(() => { URL.revokeObjectURL(url); a.remove(); }, 100);
      },
    };

    /* ---------- flow / entry detection ---------- */

    const SCREENS = ['S0','S1','S2','S2C','S3','S4','S5','S6','S7'];

    /* Session flags — in-memory, reset on reload. */
    const sessionFlags = {
      overflowDismissed: false,
      sundayDismissed: false,
      yesterdayHandled: false,
      newSessionMode: false,
      askedAddMoreAfterParked: false,
    };

    /* Captured at boot before markVisited() overwrites lastVisit. */
    let bootPrevVisit = null;

    function daysBetween(isoA, isoB) {
      const a = new Date(isoA + 'T00:00:00');
      const b = new Date(isoB + 'T00:00:00');
      return Math.round((b - a) / (24 * 60 * 60 * 1000));
    }

    function yesterdayKey(today = state.todayKey()) {
      const d = new Date(today + 'T00:00:00');
      d.setDate(d.getDate() - 1);
      return state.todayKey(d);
    }

    function isSundayToday() {
      return new Date(state.todayKey() + 'T00:00:00').getDay() === 0;
    }

    function markOpenedToday() {
      const meta = state.getDayMeta();
      const now = new Date();
      const last = meta.lastOpenedAt ? Date.parse(meta.lastOpenedAt) : 0;
      const countAsNewVisit = !last || (now.getTime() - last) > 10 * 60 * 1000;
      state.setDayMeta({
        ...meta,
        openCount: countAsNewVisit ? (meta.openCount || 0) + 1 : (meta.openCount || 1),
        lastOpenedAt: now.toISOString(),
      });
    }

    function detectEntryScreen() {
      const user = state.get(KEYS.user);
      if (!user || !user.name) {
        const welcomeShown = state.get(KEYS.welcomeShown);
        return welcomeShown ? 'S2' : 'S1';
      }

      const today = state.todayKey();
      const lastVisit = state.get(KEYS.lastVisit);
      const todayEntry = state.getToday(today);

      // Same-day closed resets intentionally reopen at the lightweight
      // Parking Lot / add-new choice instead of asking for mood again.
      if (lastVisit === today && todayEntry && todayEntry.wrapped) {
        const parked = state.get(KEYS.parked, []);
        return parked.length > 0 ? 'S2C' : 'S3';
      }
      if (lastVisit === today && todayEntry && !todayEntry.wrapped) return 'S6';
      if (lastVisit && daysBetween(lastVisit, today) >= 3) return 'S0';
      return 'S2';
    }

    /* ---------- views ---------- */

    function makeStubView(label, sub) {
      return (root) => {
        root.innerHTML = `
          <section class="pnp-surface border pnp-border rounded-2xl p-6 sm:p-8 mt-6">
            <p class="pnp-muted text-xs uppercase tracking-wide">${label}</p>
            <h1 class="text-2xl font-semibold mt-2">Coming in the next phase</h1>
            <p class="pnp-muted mt-2">${sub}</p>
            <div class="mt-6 flex flex-wrap gap-2 pnp-no-print">
              ${SCREENS.map(s => `
                <button data-goto="${s}"
                  class="text-xs px-3 py-1.5 rounded-md border pnp-border hover:opacity-80">
                  Jump to ${s}
                </button>`).join('')}
            </div>
          </section>`;
        root.querySelectorAll('[data-goto]').forEach(btn => {
          btn.addEventListener('click', () => advance(btn.dataset.goto));
        });
      };
    }

    function viewS0(root) {
      const user = state.get(KEYS.user);
      const greeting = user && user.name ? `Hey ${user.name}, welcome back.` : 'Hey there, welcome back.';
      const parked = state.get(KEYS.parked, []);
      const hasParked = parked.length > 0;

      root.innerHTML = `
        <section class="pnp-surface border pnp-border rounded-2xl p-6 sm:p-8 mt-6">
          <h1 class="text-3xl font-semibold tracking-tight">${escapeHtml(greeting)}</h1>
          <p class="pnp-muted mt-3">No streak. No catch-up. Just pick how you want to start.</p>

          <div class="mt-8 grid sm:grid-cols-2 gap-3">
            <button id="pnp-s0-fresh"
              class="text-left pnp-bg-accent rounded-xl p-5">
              <div class="font-semibold text-lg">Start fresh</div>
              <div class="text-sm opacity-80 mt-1">New mood, new dump, new day.</div>
            </button>
            <button id="pnp-s0-resume"
              class="text-left pnp-surface border pnp-border rounded-xl p-5 hover:border-[var(--pnp-accent)] transition-colors ${hasParked ? '' : 'opacity-50 cursor-not-allowed'}"
              ${hasParked ? '' : 'disabled'}>
              <div class="font-semibold text-lg">Pick up where you left off</div>
              <div class="text-sm pnp-muted mt-1">${hasParked ? `${parked.length} ${parked.length === 1 ? 'item' : 'items'} in your parking lot.` : 'Nothing parked yet.'}</div>
            </button>
          </div>
        </section>`;

      root.querySelector('#pnp-s0-fresh').addEventListener('click', () => {
        sessionFlags.newSessionMode = true;
        advance('S2');
      });
      const resume = root.querySelector('#pnp-s0-resume');
      if (hasParked) {
        resume.addEventListener('click', () => advance('S4', { source: 'parked', returnTo: 'S6' }));
      }
    }

    function viewS1(root) {
      let step = 'name';

      function paint() {
        if (step === 'name') paintName(); else paintFirstRun();
      }

      function paintName() {
        root.innerHTML = `
          <section class="pnp-surface border pnp-border rounded-2xl p-6 sm:p-8 mt-6">
            <h1 class="text-3xl font-semibold tracking-tight">Hi, what should we call you?</h1>
            <p class="pnp-muted mt-3">Just a name to make this feel like yours. Doesn't have to be your real one.</p>
            <input id="pnp-name-input" type="text" maxlength="40" autocomplete="off" inputmode="text"
              class="w-full mt-6 pnp-surface border pnp-border rounded-xl p-4 text-lg outline-none focus:border-[var(--pnp-accent)] transition-colors"
              placeholder="e.g. Jade" />
            <div class="mt-6 flex items-center gap-5">
              <button id="pnp-name-continue" class="pnp-bg-accent rounded-md px-5 py-2.5 font-medium opacity-50" disabled>Continue</button>
              <button id="pnp-name-skip" class="pnp-muted text-sm underline">Maybe later</button>
            </div>
          </section>`;

        const input = root.querySelector('#pnp-name-input');
        const cont  = root.querySelector('#pnp-name-continue');
        const skip  = root.querySelector('#pnp-name-skip');
        input.focus();

        input.addEventListener('input', () => {
          const has = input.value.trim().length > 0;
          cont.disabled = !has;
          cont.classList.toggle('opacity-50', !has);
        });
        input.addEventListener('keydown', e => {
          if (e.key === 'Enter' && !cont.disabled) { e.preventDefault(); cont.click(); }
        });
        cont.addEventListener('click', () => {
          state.setUser(renderText(input.value));
          step = 'firstrun'; paint();
        });
        skip.addEventListener('click', () => {
          state.setUser(null);
          step = 'firstrun'; paint();
        });
      }

      function paintFirstRun() {
        root.innerHTML = `
          <section class="pnp-surface border pnp-border rounded-2xl p-6 sm:p-8 mt-6">
            <p class="pnp-muted text-xs uppercase tracking-wide">First time</p>
            <h1 class="text-3xl font-semibold tracking-tight mt-2">Here's the whole loop.</h1>
            <p class="pnp-muted mt-3">Four steps. Take a couple of minutes.</p>
            <ol class="mt-6 space-y-4 text-lg list-none">
              <li class="flex gap-3"><span class="pnp-accent font-semibold w-6 mt-0.5">1.</span><span>Open this when your head feels full.</span></li>
              <li class="flex gap-3"><span class="pnp-accent font-semibold w-6 mt-0.5">2.</span><span>Dump what's rattling around. One thing per bubble.</span></li>
              <li class="flex gap-3"><span class="pnp-accent font-semibold w-6 mt-0.5">3.</span><span>Pick up to four you'll actually do today.</span></li>
              <li class="flex gap-3"><span class="pnp-accent font-semibold w-6 mt-0.5">4.</span><span>Close it. Come back tomorrow.</span></li>
            </ol>
            <p class="pnp-muted mt-6 italic">That's the whole game.</p>
            <div class="mt-6 flex items-center gap-5">
              <button id="pnp-firstrun-go" class="pnp-bg-accent rounded-md px-5 py-2.5 font-medium">Let's go</button>
              <button id="pnp-firstrun-skip" class="pnp-muted text-sm underline">Skip</button>
            </div>
          </section>`;
        const finish = () => { state.set(KEYS.welcomeShown, true); advance('S2'); };
        root.querySelector('#pnp-firstrun-go').addEventListener('click', finish);
        root.querySelector('#pnp-firstrun-skip').addEventListener('click', finish);
      }

      paint();
    }

    function viewS2(root) {
      const moods = [
        { key: 'overwhelmed', label: 'Overwhelmed', sub: 'heavy, foggy, flooded' },
        { key: 'tired',       label: 'Tired',       sub: 'low energy, depleted' },
        { key: 'okay',        label: 'Okay',        sub: 'getting on with it' },
        { key: 'great',       label: 'Great',       sub: 'strong, bright, ready' },
      ];
      const user = state.get(KEYS.user);
      const greeting = user && user.name ? `Hey ${user.name},` : 'Hey there,';

      root.innerHTML = `
        <section class="pnp-surface border pnp-border rounded-2xl p-6 sm:p-8 mt-6">
          <div class="flex justify-end">
            <button id="pnp-s2-skip" class="pnp-muted text-sm underline">Skip</button>
          </div>
          <p class="pnp-muted mt-2">${greeting.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}</p>
          <h1 class="text-3xl font-semibold tracking-tight mt-1">${sessionFlags.newSessionMode ? 'Welcome back. How are you feeling?' : 'How are you feeling today?'}</h1>
          <div class="mt-8 grid sm:grid-cols-2 gap-3">
            ${moods.map(m => `
              <button data-mood="${m.key}"
                class="text-left pnp-surface border pnp-border rounded-xl p-5 hover:border-[var(--pnp-accent)] focus:border-[var(--pnp-accent)] transition-colors">
                <div class="font-semibold text-lg">${m.label}</div>
                <div class="pnp-muted text-sm mt-1">${m.sub}</div>
              </button>`).join('')}
          </div>
        </section>`;

      const goNext = (mood) => {
        const parked = state.get(KEYS.parked, []);
        const hasActiveToday = todayListCount() > 0;
        if (sessionFlags.newSessionMode) {
          state.remove(state.todayEntryKey());
          state.set(KEYS.dumpUnsorted, []);
        }
        state.setMood(mood);
        if ((sessionFlags.newSessionMode || !hasActiveToday) && parked.length > 0) {
          advance('S2C');
        } else {
          advance('S3');
        }
      };
      root.querySelectorAll('[data-mood]').forEach(btn => {
        btn.addEventListener('click', () => goNext(btn.dataset.mood));
      });
      root.querySelector('#pnp-s2-skip').addEventListener('click', () => goNext('okay'));
    }

    function viewS2C(root) {
      const parked = state.get(KEYS.parked, []);
      const todayEntry = state.getToday();
      const returningAfterClose = !!(todayEntry && todayEntry.wrapped);
      const title = returningAfterClose || sessionFlags.newSessionMode
        ? 'Welcome back. Where would you like to start?'
        : 'Where do you want to start?';
      const parkedLabel = parked.length === 1 ? '1 item' : `${parked.length} items`;
      const subtitle = parked.length > 0
        ? `You have ${parkedLabel} in your parking lot.`
        : 'Nothing is parked right now. You can add something new.';
      const parkedDisabled = parked.length === 0 ? 'disabled aria-disabled="true"' : '';
      root.innerHTML = `
        <section class="pnp-surface border pnp-border rounded-2xl p-6 sm:p-8 mt-6">
          <h1 class="text-2xl font-semibold tracking-tight">${escapeHtml(title)}</h1>
          <p class="pnp-muted text-sm mt-2">${escapeHtml(subtitle)}</p>
          <div class="mt-6 flex flex-col gap-3">
            <button id="pnp-s2c-parked"
              ${parkedDisabled}
              class="pnp-bg-accent rounded-md px-5 py-3 font-medium text-left disabled:opacity-40 disabled:cursor-not-allowed">
              Pick from my parking lot
            </button>
            <button id="pnp-s2c-new"
              class="pnp-surface border pnp-border rounded-md px-5 py-3 text-sm text-left hover:border-[var(--pnp-accent)] transition-colors">
              Add new thoughts first
            </button>
          </div>
        </section>`;

      function prepareIfClosed() {
        const current = state.getToday();
        if (!current || !current.wrapped) return;
        createEmptyTodaySession(current.mood || (current.wrapSnapshot && current.wrapSnapshot.mood) || 'okay');
      }

      root.querySelector('#pnp-s2c-parked').addEventListener('click', () => {
        if (parked.length === 0) return;
        prepareIfClosed();
        advance('S4', { source: 'parked', returnTo: 'S6' });
      });
      root.querySelector('#pnp-s2c-new').addEventListener('click', () => {
        prepareIfClosed();
        advance('S3');
      });
    }

    function viewS3(root) {
      const MAX_BUBBLES = 8;
      const HARD_CAP = 180;
      const AMBER_AT = 160;
      const INITIAL = 4;

      const bubbles = [];
      for (let i = 0; i < INITIAL; i++) bubbles.push({ localId: 'b' + i, dumpId: null, value: '' });

      function persist(b) {
        const text = renderText(b.value);
        if (!text && b.dumpId) { state.removeDump(b.dumpId); b.dumpId = null; }
        else if (text && !b.dumpId) { b.dumpId = state.addDump(text); }
        else if (text && b.dumpId) { state.updateDump(b.dumpId, text); }
      }

      function paint() {
        root.innerHTML = `
          <section class="pnp-surface border pnp-border rounded-2xl p-6 sm:p-8 mt-6">
            <div class="flex justify-end">
              <button id="pnp-s3-skip" class="pnp-muted text-sm underline">Skip</button>
            </div>
            <h1 class="text-3xl font-semibold tracking-tight mt-2">Get it out of your head.</h1>
            <p class="pnp-muted mt-2">One thing per bubble. Doesn't have to be tidy.</p>
            <div id="pnp-bubbles" class="mt-6 space-y-3"></div>
            <div id="pnp-add-row" class="mt-3 hidden">
              <button id="pnp-add-bubble" class="text-sm pnp-muted hover:opacity-80">+ Add another</button>
            </div>
            <div class="mt-8 flex items-center gap-5">
              <button id="pnp-s3-done" class="pnp-bg-accent rounded-md px-5 py-2.5 font-medium">Done</button>
            </div>
          </section>`;

        const bubblesRoot = root.querySelector('#pnp-bubbles');
        bubbles.forEach((b, idx) => bubblesRoot.appendChild(makeBubble(b, idx)));

        updateAddVisibility();

        root.querySelector('#pnp-add-bubble').addEventListener('click', addBubble);
        root.querySelector('#pnp-s3-skip').addEventListener('click', finish);
        root.querySelector('#pnp-s3-done').addEventListener('click', finish);
      }

      function makeBubble(b, idx) {
        const wrap = document.createElement('div');
        wrap.className = 'relative';
        wrap.innerHTML = `
          <textarea rows="2" maxlength="${HARD_CAP}"
            class="w-full pnp-surface border pnp-border rounded-xl p-4 pr-20 resize-none outline-none focus:border-[var(--pnp-accent)] transition-colors"
            placeholder="${idx === 0 ? "What's been rattling around in there?" : ''}"
            data-bubble="${b.localId}"></textarea>
          <span class="absolute bottom-2 right-3 text-xs pnp-muted" data-counter="${b.localId}"></span>`;
        const ta = wrap.querySelector('textarea');
        const counter = wrap.querySelector(`[data-counter="${b.localId}"]`);
        ta.value = b.value;

        const refreshCounter = () => {
          const len = ta.value.length;
          counter.textContent = `${len} / ${HARD_CAP}`;
          counter.style.color = len >= AMBER_AT ? '#D97706' : '';
        };
        refreshCounter();

        ta.addEventListener('input', () => {
          b.value = ta.value;
          refreshCounter();
          updateAddVisibility();
        });
        ta.addEventListener('blur', () => persist(b));
        ta.addEventListener('keydown', e => {
          if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            const all = Array.from(root.querySelectorAll('textarea[data-bubble]'));
            const myIdx = all.indexOf(ta);
            if (myIdx >= 0 && myIdx < all.length - 1) all[myIdx + 1].focus();
            else if (bubbles.length < MAX_BUBBLES && allFilled()) addBubble();
          }
        });
        return wrap;
      }

      function allFilled() {
        return bubbles.every(b => b.value.trim().length > 0);
      }

      function updateAddVisibility() {
        const filled = bubbles.filter(b => b.value.trim().length > 0).length;
        const addRow = root.querySelector('#pnp-add-row');
        if (!addRow) return;
        if (filled >= INITIAL && bubbles.length < MAX_BUBBLES) addRow.classList.remove('hidden');
        else addRow.classList.add('hidden');
      }

      function addBubble() {
        if (bubbles.length >= MAX_BUBBLES) return;
        bubbles.push({ localId: 'b' + bubbles.length, dumpId: null, value: '' });
        paint();
        const all = root.querySelectorAll('textarea[data-bubble]');
        if (all.length) all[all.length - 1].focus();
      }

      function finish() {
        bubbles.forEach(persist);
        if (screenOpts && screenOpts.sourceAfterDump) {
          advance('S4', {
            source: screenOpts.sourceAfterDump,
            returnTo: screenOpts.returnTo || 'S5',
          });
        } else {
          advance('S4');
        }
      }

      paint();
    }

    function escapeHtml(s) {
      return String(s == null ? '' : s)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function showToast(msg, actionLabel, onAction, durationMs = 5000) {
      const existing = document.getElementById('pnp-toast');
      if (existing) existing.remove();
      const el = document.createElement('div');
      el.id = 'pnp-toast';
      el.className = 'pnp-no-print fixed bottom-5 left-1/2 -translate-x-1/2 pnp-surface border pnp-border rounded-full shadow-lg px-4 py-2 flex items-center gap-3 z-50 max-w-[90vw]';
      el.innerHTML = `
        <span class="text-sm truncate">${escapeHtml(msg)}</span>
        <button class="text-sm pnp-accent font-medium hover:opacity-80 shrink-0" data-toast-action>${escapeHtml(actionLabel)}</button>`;
      document.body.appendChild(el);
      let consumed = false;
      const timer = setTimeout(() => { if (!consumed) el.remove(); }, durationMs);
      el.querySelector('[data-toast-action]').addEventListener('click', () => {
        consumed = true;
        clearTimeout(timer);
        el.remove();
        if (onAction) onAction();
      });
    }

    function findDuplicate(text) {
      const norm = String(text || '').trim().toLowerCase();
      if (!norm) return null;
      const today = state.getToday() || { items: [] };
      const todayHit = (today.items || []).find(i => String(i.text || '').trim().toLowerCase() === norm);
      if (todayHit) return { in: 'today', text: todayHit.text };
      const parked = state.get(KEYS.parked, []);
      const parkedHit = parked.find(p => String(p.text || '').trim().toLowerCase() === norm);
      if (parkedHit) return { in: 'parked', text: parkedHit.text };
      const dump = state.get(KEYS.dumpUnsorted, []);
      const dumpHit = dump.find(d => String(d.text || '').trim().toLowerCase() === norm);
      if (dumpHit) return { in: 'dump', text: dumpHit.text };
      return null;
    }

    function showDuplicateConfirm(hit, onAdd, onSkip) {
      const where = hit.in === 'today' ? "on today's list"
                  : hit.in === 'parked' ? "in your parking lot"
                  : "in your unsorted brain dump";
      const overlay = document.createElement('div');
      overlay.className = 'pnp-no-print fixed inset-0 z-50 flex items-end sm:items-center justify-center p-4';
      overlay.style.background = 'rgba(0,0,0,0.6)';
      overlay.innerHTML = `
        <div class="pnp-surface border pnp-border rounded-2xl p-6 w-full max-w-md">
          <h2 class="text-xl font-semibold">You've got this one already</h2>
          <p class="pnp-muted mt-3">"${escapeHtml(hit.text)}" is ${escapeHtml(where)}.</p>
          <p class="pnp-muted mt-2 text-sm">Add it anyway if it's a separate task. Skip if it's a duplicate.</p>
          <div class="mt-5 flex flex-wrap items-center gap-3 justify-end">
            <button id="pnp-dup-skip" class="pnp-muted text-sm underline">Skip</button>
            <button id="pnp-dup-add" class="pnp-bg-accent rounded-md px-4 py-2 font-medium">Add anyway</button>
          </div>
        </div>`;
      document.body.appendChild(overlay);
      function done(action) {
        document.removeEventListener('keydown', escHandler);
        overlay.remove();
        if (action === 'add' && onAdd) onAdd();
        else if (action === 'skip' && onSkip) onSkip();
      }
      function escHandler(e) { if (e.key === 'Escape') done('skip'); }
      overlay.querySelector('#pnp-dup-skip').addEventListener('click', () => done('skip'));
      overlay.querySelector('#pnp-dup-add').addEventListener('click', () => done('add'));
      overlay.addEventListener('click', e => { if (e.target === overlay) done('skip'); });
      document.addEventListener('keydown', escHandler);
    }

    function viewS4(root) {
      const sourceFilter = (screenOpts && screenOpts.source) || 'all';
      const returnTo = (screenOpts && screenOpts.returnTo) || 'S5';

      const dumpItems = sourceFilter === 'parked'
        ? []
        : state.get(KEYS.dumpUnsorted, []).map(d => ({ ...d, origin: 'dump' }));
      const parkedItems = sourceFilter === 'dump'
        ? []
        : state.get(KEYS.parked, []).map(p => ({ ...p, origin: 'parked' }));
      const queue = [...dumpItems, ...parkedItems];

      if (queue.length === 0) { finishSort(); return; }

      let cursor = 0;
      const total = queue.length;

      function paint() {
        const item = queue[cursor];
        if (!item) { finishSort(); return; }
        const capFull = !todayHasRoom();

        root.innerHTML = `
          <section class="mt-6">
            <div class="flex items-center justify-between">
              <h1 class="text-2xl sm:text-3xl font-semibold tracking-tight">Sort the noise</h1>
              <p class="pnp-muted text-sm">${cursor + 1} of ${total}</p>
            </div>
            <div class="pnp-surface border pnp-border rounded-2xl p-6 sm:p-8 mt-4 min-h-[8rem]">
              <p class="text-lg leading-relaxed">• ${escapeHtml(renderText(item.text))}</p>
              ${item.origin === 'parked' ? '<p class="pnp-muted text-xs mt-3 uppercase tracking-wide">From your parking lot</p>' : ''}
            </div>
            <div class="mt-5 grid grid-cols-3 gap-3">
              <button id="pnp-now"
                class="rounded-xl ${capFull ? 'pnp-surface border pnp-border pnp-muted' : 'pnp-bg-accent'} font-medium py-3 text-base sm:text-lg"
                ${capFull ? 'disabled' : ''}>${capFull ? 'Today is full' : 'Now'}</button>
              <button id="pnp-park"
                class="rounded-xl pnp-surface border pnp-border font-medium py-3 text-base sm:text-lg hover:border-[var(--pnp-accent)] transition-colors">Park</button>
              <button id="pnp-remove"
                class="rounded-xl pnp-surface border pnp-border font-medium py-3 text-base sm:text-lg hover:border-[var(--pnp-accent)] transition-colors">Remove</button>
            </div>
            <p class="pnp-no-print pnp-muted text-xs mt-2 text-center">Now = today's list · Park = save for later · Remove = let it go</p>
          </section>`;

        root.querySelector('#pnp-now').addEventListener('click', () => handle('now', item));
        root.querySelector('#pnp-park').addEventListener('click', () => handle('park', item));
        root.querySelector('#pnp-remove').addEventListener('click', () => handle('remove', item));
      }

      function removeFromOrigin(item) {
        if (item.origin === 'dump') state.removeDump(item.id);
        else state.removeParked(item.id);
      }

      function restore(item) {
        if (item.origin === 'dump') {
          const dump = state.get(KEYS.dumpUnsorted, []);
          dump.push({ id: item.id, text: item.text, createdAt: item.createdAt });
          state.set(KEYS.dumpUnsorted, dump);
        } else {
          const parked = state.get(KEYS.parked, []);
          parked.push({ id: item.id, text: item.text, parkedAt: item.parkedAt, lastTouched: item.lastTouched });
          state.set(KEYS.parked, parked);
        }
      }

      function handle(action, item) {
        if (action === 'now') {
          const added = state.addTodayItem(renderText(item.text));
          if (!added) {
            showToast("Today's list is full.", 'Park it', () => handle('park', item), 4000);
            return;
          }
          removeFromOrigin(item);
        } else if (action === 'park') {
          if (item.origin === 'dump') {
            state.addParked(renderText(item.text));
            state.removeDump(item.id);
          } else {
            state.refreshParkedTouched(item.id);
          }
        } else if (action === 'remove') {
          removeFromOrigin(item);
          const preview = renderText(item.text);
          const short = preview.length > 40 ? preview.slice(0, 40) + '…' : preview;
          showToast(`Removed "${short}"`, 'Undo', () => restore(item));
        }
        cursor++;
        paint();
      }

      function finishSort() {
        if (sourceFilter !== 'parked' || sessionFlags.askedAddMoreAfterParked || !todayHasRoom()) {
          advance(returnTo);
          return;
        }

        sessionFlags.askedAddMoreAfterParked = true;
        const count = todayListCount();
        const title = count > 0 ? 'Want to add anything new?' : 'Nothing chosen for today.';
        const body = count > 0
          ? 'You can add one or two fresh thoughts, or keep today light.'
          : 'You can add something new, or keep today clear.';

        root.innerHTML = `
          <section class="pnp-surface border pnp-border rounded-2xl p-6 sm:p-8 mt-6">
            <h1 class="text-2xl sm:text-3xl font-semibold tracking-tight">${title}</h1>
            <p class="pnp-muted mt-3">${body}</p>
            <div class="mt-6 grid gap-3">
              <button id="pnp-add-new-after-parked"
                class="pnp-bg-accent rounded-md px-5 py-3 font-medium text-left">
                Add something new
              </button>
              <button id="pnp-keep-light-after-parked"
                class="pnp-surface border pnp-border rounded-md px-5 py-3 text-left hover:border-[var(--pnp-accent)] transition-colors">
                ${count > 0 ? 'Keep today light' : 'Keep today clear'}
              </button>
            </div>
          </section>`;

        root.querySelector('#pnp-add-new-after-parked').addEventListener('click', () => {
          advance('S3', { sourceAfterDump: 'dump', returnTo });
        });
        root.querySelector('#pnp-keep-light-after-parked').addEventListener('click', () => advance(returnTo));
      }

      paint();
    }

    function viewS5(root) {
      const today = state.getToday() || { items: [] };
      const allItems = (today.items || []).slice();
      const lockedItems = allItems.filter(i => i.locked);
      const items = allItems.filter(i => !i.locked);

      function unlockAll() {
        const t = state.getToday();
        if (!t || !Array.isArray(t.items)) return;
        t.items = t.items.map(i => { const { locked, ...rest } = i; return rest; });
        state.setToday(t);
      }

      if (items.length === 0) {
        root.innerHTML = `
          <section class="pnp-surface border pnp-border rounded-2xl p-6 sm:p-8 mt-6">
            <h1 class="text-2xl sm:text-3xl font-semibold tracking-tight">What's the one thing that needs to happen today?</h1>
            <input id="pnp-empty-task" type="text" maxlength="180"
              class="w-full mt-6 pnp-surface border pnp-border rounded-xl p-4 text-lg outline-none focus:border-[var(--pnp-accent)] transition-colors"
              placeholder="One thing." />
            <div class="mt-6 flex items-center gap-5">
              <button id="pnp-empty-add" class="pnp-bg-accent rounded-md px-5 py-2.5 font-medium opacity-50" disabled>Add</button>
              <button id="pnp-empty-skip" class="pnp-muted text-sm underline">Nothing today</button>
            </div>
          </section>`;
        const input = root.querySelector('#pnp-empty-task');
        const add   = root.querySelector('#pnp-empty-add');
        const skip  = root.querySelector('#pnp-empty-skip');
        input.focus();
        input.addEventListener('input', () => {
          const has = input.value.trim().length > 0;
          add.disabled = !has;
          add.classList.toggle('opacity-50', !has);
        });
        input.addEventListener('keydown', e => { if (e.key === 'Enter' && !add.disabled) { e.preventDefault(); add.click(); } });
        add.addEventListener('click', () => {
          const text = renderText(input.value);
          if (!text) return;
          if (!todayHasRoom()) {
            showToast("Today's list is full.", 'OK', null, 3000);
            return;
          }
          const hit = findDuplicate(text);
          const proceed = () => {
            state.addTodayItem(text);
            unlockAll();
            sessionFlags.newSessionMode = false;
            advance('S6');
          };
          if (hit) showDuplicateConfirm(hit, proceed, () => { input.focus(); });
          else proceed();
        });
        skip.addEventListener('click', () => {
          unlockAll();
          sessionFlags.newSessionMode = false;
          advance('S6');
        });
        return;
      }

      const selected = new Set();

      function paint() {
        const todayNow = state.getToday() || { items: [] };
        const liveItems = (todayNow.items || []).filter(i => !i.locked);
        const lockedNow = (todayNow.items || []).filter(i => i.locked);
        const capacity = Math.max(0, 4 - todayListCount({ items: lockedNow }));

        root.innerHTML = `
          <section class="pnp-surface border pnp-border rounded-2xl p-6 sm:p-8 mt-6">
            <div class="flex items-start justify-between gap-3">
              <h1 class="text-2xl sm:text-3xl font-semibold tracking-tight">What feels doable today?</h1>
              <button id="pnp-s5-skip" class="pnp-muted text-sm underline shrink-0 mt-1">Skip</button>
            </div>
            ${lockedNow.length > 0 ? `<p class="pnp-muted text-xs mt-2">${lockedNow.length} ${lockedNow.length === 1 ? 'task is' : 'tasks are'} already on today's list. Picking adds to that.</p>` : ''}
            <div class="flex items-center justify-between mt-2">
              <p class="pnp-muted text-sm">${capacity > 0 ? `Pick up to ${capacity}` : "Today's list is full"}</p>
              <p class="pnp-muted text-sm"><span id="pnp-counter">${selected.size} of ${capacity} picked</span></p>
            </div>
            <ul id="pnp-pick-list" class="mt-6 space-y-2"></ul>
            <p class="pnp-muted text-xs mt-4">Tap × beside any task to send it back to your parking lot.</p>
            <div class="mt-4 flex items-center gap-5">
              <button id="pnp-confirm" class="pnp-bg-accent rounded-md px-5 py-2.5 font-medium ${selected.size === 0 ? 'opacity-50' : ''}" ${selected.size === 0 ? 'disabled' : ''}>Confirm</button>
            </div>
          </section>`;

        const list = root.querySelector('#pnp-pick-list');
        liveItems.forEach(item => {
          const li = document.createElement('li');
          const checked = selected.has(item.id);
          li.className = 'flex items-stretch gap-2';
          li.innerHTML = `
            <button data-pick="${escapeHtml(item.id)}"
              class="flex-1 text-left pnp-surface border ${checked ? 'border-[var(--pnp-accent)]' : 'pnp-border'} rounded-xl p-4 hover:border-[var(--pnp-accent)] transition-colors flex items-start gap-3">
              <span class="pnp-accent font-bold text-lg w-5 mt-0.5">${checked ? '✓' : '•'}</span>
              <span class="flex-1">${escapeHtml(renderText(item.text))}</span>
            </button>
            <button data-remove="${escapeHtml(item.id)}"
              class="pnp-muted px-3 hover:opacity-70 text-xl"
              aria-label="Send back to parking lot"
              title="Send to parking lot">×</button>`;
          list.appendChild(li);
        });

        list.querySelectorAll('[data-pick]').forEach(btn => {
          btn.addEventListener('click', () => togglePick(btn.dataset.pick));
        });
        list.querySelectorAll('[data-remove]').forEach(btn => {
          btn.addEventListener('click', () => sendToParked(btn.dataset.remove));
        });
        root.querySelector('#pnp-confirm').addEventListener('click', confirm);
        root.querySelector('#pnp-s5-skip').addEventListener('click', skipAll);
      }

      function togglePick(id) {
        const todayNow = state.getToday() || { items: [] };
        const lockedNow = (todayNow.items || []).filter(i => i.locked);
        const capacity = Math.max(0, 4 - todayListCount({ items: lockedNow }));
        if (selected.has(id)) selected.delete(id);
        else if (selected.size < capacity) selected.add(id);
        paint();
      }

      function sendToParked(id) {
        const todayNow = state.getToday();
        if (!todayNow) return;
        const item = todayNow.items.find(i => i.id === id);
        if (!item || item.locked) return;
        state.addParked(item.text);
        state.setTodayItems(todayNow.items.filter(i => i.id !== id));
        selected.delete(id);
        const remaining = todayNow.items.filter(i => i.id !== id && !i.locked);
        if (remaining.length === 0) {
          unlockAll();
          sessionFlags.newSessionMode = false;
          advance('S6');
          return;
        }
        paint();
      }

      function skipAll() {
        const todayNow = state.getToday();
        if (todayNow && Array.isArray(todayNow.items)) {
          const unlocked = todayNow.items.filter(i => !i.locked);
          unlocked.forEach(i => state.addParked(i.text));
          const locked = todayNow.items.filter(i => i.locked).map(i => { const { locked: _l, ...rest } = i; return rest; });
          state.setTodayItems(locked);
        }
        sessionFlags.newSessionMode = false;
        advance('S6');
      }

      function confirm() {
        if (selected.size === 0) return;
        const todayNow = state.getToday();
        const lockedKeep = todayNow.items.filter(i => i.locked).map(i => { const { locked: _l, ...rest } = i; return rest; });
        const unlocked = todayNow.items.filter(i => !i.locked);
        const kept = unlocked.filter(i => selected.has(i.id));
        const dropped = unlocked.filter(i => !selected.has(i.id));
        dropped.forEach(d => state.addParked(d.text));
        state.setTodayItems([...lockedKeep, ...kept]);
        sessionFlags.newSessionMode = false;
        advance('S6');
      }

      paint();
    }

    function viewS6(root) {
      function paint() {
        const today = state.getToday() || { items: [] };
        const items = today.items || [];
        const mood = today.mood || 'okay';
        const priorityId = today.priorityItemId || null;
        const settings = state.get(KEYS.settings, defaultSettings);
        const dayMeta = state.getDayMeta();
        const parked = state.get(KEYS.parked, []);
        const parkedCount = parked.length;

        const hasUndone = items.some(i => !i.done && !i.isParent);
        const allDone = items.length > 0 && !hasUndone;
        const doneCount = items.filter(i => i.done && !i.isParent).length;
        const returnHint = dayMeta.openCount >= 3
          ? (doneCount > 0
            ? `Welcome back. ${doneCount} ${doneCount === 1 ? 'thing has' : 'things have'} moved already. Keep going, park what feels heavy, or wrap up.`
            : 'Welcome back. Your list is still here. You can start small, park something, or wrap up.')
          : dayMeta.openCount === 2
            ? 'Welcome back. Pick up where you left off.'
            : '';

        const dateStr = settings.showDateOnToday
          ? new Date().toLocaleDateString('en-GB', { weekday: 'long', day: 'numeric', month: 'long' })
          : '';

        const bannerHtml = renderBanners({ today, items, parked, settings });
        const plusOneHtml = '';
        const itemHighlight = (id) => priorityId && id === priorityId
          ? 'pnp-surface border pnp-border rounded-lg p-2 -ml-2'
          : '';

        const parkedLabel = parkedCount === 1 ? '1 item parked' : `${parkedCount} items parked`;

        root.innerHTML = `
          <section class="mt-6">
            <div class="flex items-center justify-between">
              ${dateStr ? `<p class="pnp-muted text-sm">${escapeHtml(dateStr)}</p>` : '<span></span>'}
              <button id="pnp-parked-badge" class="pnp-no-print pnp-muted text-sm underline hover:opacity-80">${parkedLabel}</button>
            </div>

            ${bannerHtml}

            ${plusOneHtml}

            ${returnHint ? `<p class="pnp-no-print pnp-muted text-sm mt-4">${escapeHtml(returnHint)}</p>` : ''}

            ${hasUndone ? '<p class="pnp-no-print pnp-muted text-sm mt-4 mb-2">Tap a task to mark it done.</p>' : ''}

            <div class="pnp-surface border pnp-border rounded-2xl p-6 sm:p-8 mt-2">
              ${items.length === 0
                ? '<p class="pnp-muted">Nothing on your list for today yet.</p>'
                : '<ul id="pnp-today-list" class="space-y-3 text-lg"></ul>'}
            </div>


            ${allDone ? `
              <div class="pnp-no-print pnp-surface border pnp-border rounded-xl p-4 mt-4">
                <p class="text-sm">All ticked. Wrap up, or start a new session?</p>
              </div>` : ''}

            <div class="pnp-no-print mt-6 flex flex-wrap items-center gap-3">
              <button id="pnp-wrap" class="pnp-bg-accent rounded-md px-5 py-2.5 font-medium">Wrap up</button>
              ${hasUndone && doneCount > 0 ? '<button id="pnp-stuck" class="text-sm pnp-surface border pnp-border rounded-md px-4 py-2 hover:border-[var(--pnp-accent)] transition-colors">Stuck?</button>' : ''}
              ${allDone ? '<button id="pnp-newsession-btn" class="text-sm pnp-surface border pnp-border rounded-md px-4 py-2 hover:border-[var(--pnp-accent)] transition-colors">Start a new session</button>' : ''}
              <button id="pnp-print" class="text-sm pnp-muted underline hover:opacity-80">Print today</button>
            </div>

            ${!allDone ? `
              <div class="pnp-no-print mt-6">
                <button id="pnp-newsession" class="pnp-muted text-xs underline hover:opacity-80">Start a new session</button>
              </div>` : ''}
          </section>

          <button id="pnp-fab"
            class="pnp-no-print fixed bottom-5 right-5 w-14 h-14 rounded-full pnp-bg-accent text-2xl font-bold shadow-lg z-30 hover:opacity-90"
            aria-label="Quick brain dump">+</button>`;

        const list = root.querySelector('#pnp-today-list');
        if (list) {
          items.forEach(item => {
            const li = document.createElement('li');
            if (item.isParent) {
              li.className = 'pt-3 pb-0.5';
              li.innerHTML = `
                <span class="block pnp-muted text-sm opacity-70">
                  ${escapeHtml(renderText(item.text))}
                </span>`;
            } else if (item.parentId) {
              li.className = `flex items-start gap-3 cursor-pointer transition-opacity duration-200 select-none pl-4 ${itemHighlight(item.id)}`;
              if (item.done) li.style.opacity = '0.5';
              li.innerHTML = `
                <span class="pnp-accent text-base mt-0.5 w-5">${item.done ? '✓' : '•'}</span>
                <span class="flex-1 ${item.done ? 'line-through' : ''}">${escapeHtml(renderText(item.text))}</span>
                ${!item.done ? `<button data-timer="${escapeHtml(item.id)}" class="pnp-no-print text-xs pnp-surface border pnp-border rounded-full px-3 py-1 hover:border-[var(--pnp-accent)] transition-colors shrink-0">Timer</button>` : ''}`;
              li.addEventListener('click', () => {
                state.toggleTodayItem(item.id);
                paint();
              });
              const timerBtn = li.querySelector('[data-timer]');
              if (timerBtn) timerBtn.addEventListener('click', e => {
                e.stopPropagation();
                openTinyTimer(item.id, paint);
              });
            } else {
              li.className = `flex items-start gap-3 cursor-pointer transition-opacity duration-200 select-none ${itemHighlight(item.id)}`;
              if (item.done) li.style.opacity = '0.5';
              li.innerHTML = `
                <span class="pnp-accent text-xl mt-0.5 w-5">${item.done ? '✓' : (priorityId === item.id ? '★' : '•')}</span>
                <span class="flex-1 ${item.done ? 'line-through' : ''}">${escapeHtml(renderText(item.text))}</span>
                ${!item.done ? `<button data-timer="${escapeHtml(item.id)}" class="pnp-no-print text-xs pnp-surface border pnp-border rounded-full px-3 py-1 hover:border-[var(--pnp-accent)] transition-colors shrink-0">Timer</button>` : ''}`;
              li.addEventListener('click', () => {
                state.toggleTodayItem(item.id);
                paint();
              });
              const timerBtn = li.querySelector('[data-timer]');
              if (timerBtn) timerBtn.addEventListener('click', e => {
                e.stopPropagation();
                openTinyTimer(item.id, paint);
              });
            }
            list.appendChild(li);
          });
        }

        wireBanners(root);
        root.querySelector('#pnp-parked-badge').addEventListener('click', () => {
          advance('S4', { source: 'parked', returnTo: 'S6' });
        });
        root.querySelector('#pnp-wrap').addEventListener('click', () => advance('S7'));
        root.querySelector('#pnp-print').addEventListener('click', () => window.print());
        root.querySelector('#pnp-fab').addEventListener('click', openFab);
        const newSessionLink = root.querySelector('#pnp-newsession');
        if (newSessionLink) newSessionLink.addEventListener('click', startNewSession);
        const newSessionBtn = root.querySelector('#pnp-newsession-btn');
        if (newSessionBtn) newSessionBtn.addEventListener('click', startNewSession);
        const stuckBtn = root.querySelector('#pnp-stuck');
        if (stuckBtn) stuckBtn.addEventListener('click', () => openStuckOverlay(paint));
      }

      function startNewSession() {
        const today = state.getToday();
        const carriedMood = today && today.mood ? today.mood : 'okay';
        if (today && Array.isArray(today.items)) {
          today.items
            .filter(i => !i.done && !i.isParent)
            .forEach(i => state.addParked(i.text));
        }
        state.remove(state.todayEntryKey());
        state.set(KEYS.dumpUnsorted, []);
        state.setToday({
          mood: carriedMood,
          items: [],
          dumpEntries: [],
          wrapped: false,
          plusOneDismissed: true,
        });
        sessionFlags.newSessionMode = true;
        const parked = state.get(KEYS.parked, []);
        if (parked.length > 0) advance('S2C');
        else advance('S3');
      }

      function renderBanners({ today, items, parked, settings }) {
        const out = [];

        if (!sessionFlags.yesterdayHandled) {
          const yKey = yesterdayKey();
          const yEntry = state.getToday(yKey);
          if (yEntry && yEntry.wrapped === false && Array.isArray(yEntry.items)) {
            const outstanding = yEntry.items.filter(i => !i.done && !i.isParent);
            if (outstanding.length > 0) {
              out.push(`
                <div id="pnp-banner-yesterday" class="pnp-no-print pnp-surface border pnp-border rounded-xl p-4 mt-4 flex items-start gap-3">
                  <span class="pnp-accent text-lg">↻</span>
                  <div class="flex-1">
                    <p class="text-sm">Yesterday wasn't closed. ${outstanding.length} ${outstanding.length === 1 ? 'task was' : 'tasks were'} outstanding. Move them to your parking lot?</p>
                    <div class="mt-2 flex gap-3">
                      <button data-banner="yesterday-yes" class="pnp-bg-accent rounded-md px-3 py-1.5 text-sm font-medium">Move them</button>
                      <button data-banner="yesterday-dismiss" class="pnp-muted text-sm underline">Not now</button>
                    </div>
                  </div>
                </div>`);
            }
          }
        }
